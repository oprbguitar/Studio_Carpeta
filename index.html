<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Herramienta de Analisis Fiscal / FCIS</title>
  <style>
    :root {
      --blue-950: #051f63;
      --blue-900: #0735b7;
      --blue-800: #0b48de;
      --blue-700: #1558ff;
      --blue-100: #eef5ff;
      --blue-050: #f7fbff;
      --gold: #ffad18;
      --green: #13a65b;
      --orange: #ff8a00;
      --red: #ff4141;
      --purple: #8d35ff;
      --ink: #06286f;
      --muted: #5570ad;
      --line: #d9e6fb;
      --panel: #ffffff;
      --bg: #f7fbff;
      --shadow: 0 10px 26px rgba(7, 53, 183, .07);
      --sidebar: 196px;
      --topbar: 54px;
      --footer: 38px;
      --radius: 8px;
    }

    html, body, #app {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      letter-spacing: 0;
    }

    * { box-sizing: border-box; }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    button:focus-visible, input:focus-visible, select:focus-visible {
      outline: 3px solid rgba(21, 88, 255, .24);
      outline-offset: 2px;
    }

    #app {
      display: grid;
      grid-template-columns: var(--sidebar) minmax(0, 1fr);
      background: linear-gradient(180deg, #fbfdff, #f4f9ff);
    }

    .sidebar {
      min-width: 0;
      height: 100vh;
      overflow: hidden;
      background: #fff;
      border-right: 1px solid var(--line);
      padding: 22px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .brand { text-align: center; color: var(--blue-950); font-weight: 850; }
    .mark {
      width: 58px;
      height: 66px;
      margin: 0 auto 12px;
      display: grid;
      place-items: center;
      background: linear-gradient(160deg, #0642e5, #032f9d);
      color: var(--gold);
      clip-path: polygon(50% 0, 91% 18%, 84% 72%, 50% 100%, 16% 72%, 9% 18%);
      box-shadow: 0 12px 22px rgba(6, 66, 229, .19);
    }
    .brand-title { font-size: 15px; line-height: 1.08; }
    .brand-acronym { margin-top: 6px; font-size: 10px; color: var(--muted); letter-spacing: 1px; }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 7px;
      min-height: 0;
      overflow: hidden;
    }

    .nav button {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--blue-950);
      min-height: 38px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 11px;
      border-radius: var(--radius);
      font-size: 12.5px;
      font-weight: 800;
      text-align: left;
    }

    .nav button.active {
      background: #edf4ff;
      color: var(--blue-800);
      box-shadow: inset 3px 0 0 var(--blue-700);
    }

    .ico {
      width: 20px;
      height: 20px;
      flex: 0 0 20px;
      color: currentColor;
    }

    .case-mini {
      margin-top: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      background: #fff;
      color: var(--muted);
      box-shadow: 0 8px 18px rgba(7, 53, 183, .04);
      font-size: 12px;
    }
    .case-mini strong {
      display: block;
      color: var(--blue-900);
      font-size: 16px;
      margin: 7px 0 4px;
    }
    .case-mini .btn { width: 100%; margin-top: 12px; }
    .collapse {
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 2px;
    }

    .main {
      min-width: 0;
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-rows: var(--topbar) minmax(0, 1fr) var(--footer);
    }

    .topbar {
      position: relative;
      min-width: 0;
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(180px, 1fr) minmax(290px, 460px) auto;
      align-items: center;
      gap: 18px;
      padding: 8px 24px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #f2f7ff, #edf5ff);
    }

    .crumb {
      color: var(--blue-800);
      font-size: 12.5px;
      font-weight: 850;
      white-space: nowrap;
    }

    .search {
      height: 34px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #cddcf4;
      background: #fff;
      border-radius: var(--radius);
      padding: 0 12px;
      color: var(--muted);
      min-width: 0;
    }
    .search input {
      min-width: 0;
      flex: 1;
      border: 0;
      outline: 0;
      color: var(--ink);
      font-size: 12.5px;
    }
    .keycap {
      padding: 1px 6px;
      border-radius: 6px;
      background: var(--blue-100);
      color: var(--blue-900);
      font-size: 11px;
      font-weight: 800;
    }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      white-space: nowrap;
    }
    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid transparent;
      background: transparent;
      color: var(--blue-900);
      display: grid;
      place-items: center;
      position: relative;
    }
    .dot {
      position: absolute;
      top: 4px;
      right: 5px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gold);
    }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: white;
      background: var(--blue-900);
      font-weight: 900;
    }
    .user {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--blue-950);
      font-size: 13px;
      font-weight: 850;
    }
    .legal-top {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 1px;
      text-align: center;
      color: rgba(6, 40, 111, .62);
      font-size: 9.5px;
      pointer-events: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .content {
      min-height: 0;
      overflow: hidden;
      padding: 14px 22px 12px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
    }

    .head {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: start;
    }
    h1 {
      margin: 0;
      color: var(--blue-900);
      font-size: clamp(25px, 2vw, 34px);
      line-height: 1.05;
      font-weight: 900;
    }
    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }
    .actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }

    .screen {
      min-height: 0;
      overflow: hidden;
      display: grid;
      gap: 12px;
    }

    .panel {
      min-width: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .pad { padding: 14px; }

    .btn {
      min-height: 34px;
      border-radius: var(--radius);
      border: 1px solid #cddcf4;
      background: #fff;
      color: var(--blue-900);
      padding: 8px 13px;
      font-size: 12.5px;
      font-weight: 850;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }
    .btn.primary {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(180deg, #0d4cff, #0636b8);
      box-shadow: 0 9px 18px rgba(7, 53, 183, .18);
    }
    .btn.ghost { background: #f9fcff; }
    .btn.small { min-height: 28px; padding: 6px 9px; font-size: 11.5px; }

    .summary-strip {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      min-height: 86px;
      align-items: center;
    }
    .summary-strip.four { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .summary-cell {
      display: grid;
      grid-template-columns: 46px 1fr;
      gap: 12px;
      align-items: center;
      padding: 14px 20px;
      border-right: 1px solid var(--line);
      min-width: 0;
    }
    .summary-cell:last-child { border-right: 0; }
    .label { color: var(--blue-900); font-size: 11.5px; font-weight: 800; }
    .value { color: var(--blue-900); font-size: 18px; font-weight: 900; margin-top: 2px; }
    .tiny { color: var(--muted); font-size: 11.5px; line-height: 1.35; }

    .orb {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--blue-900);
      background: var(--blue-100);
    }
    .orb.gold { color: var(--orange); background: #fff1d8; }
    .orb.green { color: var(--green); background: #e9f9f0; }
    .orb.purple { color: var(--purple); background: #f2eaff; }

    .kpis {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }
    .kpi {
      min-height: 76px;
      display: grid;
      grid-template-columns: 46px 1fr;
      align-items: center;
      gap: 13px;
      padding: 13px 18px;
    }
    .kpi .value { font-size: 24px; }

    .home-grid {
      grid-template-rows: minmax(210px, .92fr) minmax(190px, .88fr);
      min-height: 0;
    }
    .hero-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      min-height: 0;
    }
    .home-card {
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 14px;
    }
    .home-card .orb { width: 78px; height: 78px; }
    .home-card .orb .ico { width: 42px; height: 42px; }
    .home-card h2 { margin: 0; color: var(--blue-950); font-size: 21px; line-height: 1.1; }
    .home-card p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.42; max-width: 270px; }
    .home-card .btn { width: min(220px, 80%); }
    .home-bottom {
      min-height: 0;
      display: grid;
      grid-template-columns: 1.1fr 1fr .9fr .65fr;
      gap: 14px;
    }

    .list { display: grid; gap: 0; }
    .list-row {
      min-height: 43px;
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) auto;
      gap: 9px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      border-left: 0;
      border-right: 0;
      border-top: 0;
      background: transparent;
      width: 100%;
      text-align: left;
      font-size: 12px;
    }
    .list-row:last-child { border-bottom: 0; }
    .list-row strong { color: var(--blue-900); font-size: 13px; }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      background: var(--green);
    }
    .status-dot.orange { background: var(--orange); }
    .status-dot.blue { background: var(--blue-700); }

    .quick-list .list-row { grid-template-columns: 34px minmax(0, 1fr) 18px; min-height: 40px; }
    .ia-illustration {
      height: 78px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, #dceaff, #f6fbff);
      margin: 12px 0;
      display: grid;
      place-items: center;
      color: var(--blue-700);
      font-weight: 900;
      font-size: 22px;
    }

    .main-two {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1.72fr) minmax(310px, .88fr);
      gap: 14px;
    }
    .left-stack, .right-stack {
      min-height: 0;
      overflow: hidden;
      display: grid;
      gap: 12px;
    }
    .left-stack { grid-template-rows: minmax(270px, 1fr) minmax(130px, .45fr); }
    .right-stack { grid-template-rows: minmax(220px, .9fr) minmax(180px, .8fr); }
    .bottom-split {
      display: grid;
      grid-template-columns: 1fr .95fr;
      gap: 12px;
      min-height: 0;
    }

    .section-title {
      margin: 0 0 10px;
      color: var(--blue-900);
      font-size: 15px;
      line-height: 1.1;
      font-weight: 900;
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 9px;
    }
    .filters {
      display: grid;
      grid-template-columns: repeat(4, minmax(94px, 1fr)) minmax(150px, 1.5fr);
      gap: 9px;
      margin-bottom: 10px;
    }
    .filters.four { grid-template-columns: repeat(3, minmax(110px, 1fr)) minmax(190px, 1.6fr); }
    select, .filter-input {
      height: 31px;
      border: 1px solid #cddcf4;
      border-radius: 7px;
      background: #fff;
      color: var(--blue-900);
      padding: 0 10px;
      font-size: 11.5px;
      font-weight: 700;
      min-width: 0;
    }
    .filter-label {
      display: grid;
      gap: 5px;
      color: var(--blue-900);
      font-size: 10.5px;
      font-weight: 850;
    }
    .filter-input { display: flex; align-items: center; gap: 8px; color: var(--muted); }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      color: var(--blue-950);
      font-size: 11.2px;
    }
    th {
      height: 32px;
      background: #f4f8ff;
      color: var(--blue-950);
      text-align: left;
      font-size: 10.6px;
      font-weight: 900;
      padding: 0 9px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    td {
      height: 36px;
      border-bottom: 1px solid var(--line);
      padding: 0 9px;
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    tr.selected { background: #f0f6ff; }
    .table-wrap {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .table-foot {
      height: 34px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 11px;
      padding: 0 8px;
    }
    .pages { display: flex; gap: 7px; align-items: center; }
    .page {
      min-width: 28px;
      height: 28px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--blue-900);
      border-radius: 7px;
      font-weight: 800;
    }
    .page.active { color: #fff; background: var(--blue-900); }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 6px;
      padding: 4px 7px;
      font-size: 10.6px;
      font-weight: 850;
      background: var(--blue-100);
      color: var(--blue-900);
    }
    .pill.green { color: var(--green); background: #eaf9f0; }
    .pill.orange { color: var(--orange); background: #fff1dc; }
    .pill.red { color: var(--red); background: #ffe9e9; }
    .pill.purple { color: var(--purple); background: #f1e9ff; }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px 16px;
      font-size: 12px;
    }
    .detail-grid .wide { grid-column: 1 / -1; }
    .detail-label { color: var(--blue-900); font-size: 10.8px; font-weight: 900; }
    .detail-value { margin-top: 2px; color: var(--ink); line-height: 1.35; }
    .timeline-mini {
      margin-top: 13px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
      align-items: center;
      text-align: center;
      color: var(--muted);
      font-size: 9.5px;
    }
    .step {
      position: relative;
      display: grid;
      justify-items: center;
      gap: 5px;
    }
    .step:before {
      content: "";
      position: absolute;
      left: -50%;
      right: 50%;
      top: 10px;
      border-top: 2px solid #9dd9ba;
      z-index: 0;
    }
    .step:first-child:before { display: none; }
    .step span {
      width: 21px;
      height: 21px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #fff;
      border: 1px solid #bdd0ee;
      color: var(--blue-900);
      font-weight: 900;
      z-index: 1;
    }
    .step.done span { color: var(--green); border-color: var(--green); background: #f1fff7; }
    .step.active span { color: #fff; border-color: var(--blue-900); background: var(--blue-900); }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .quick-grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .quick-grid .btn {
      min-height: 58px;
      flex-direction: column;
      gap: 6px;
    }

    .ai-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 8px;
      min-height: 0;
    }
    .ai-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--blue-900);
      font-size: 15px;
      font-weight: 900;
    }
    .online { color: var(--green); font-size: 11.5px; font-weight: 800; }
    .chat {
      min-height: 0;
      display: grid;
      gap: 8px;
      align-content: start;
      overflow: hidden;
    }
    .bubble {
      border-radius: 8px;
      background: #edf4ff;
      color: var(--ink);
      padding: 9px 11px;
      font-size: 11.5px;
      line-height: 1.4;
    }
    .bubble.response { background: #fff; border: 1px solid var(--line); }
    .ai-cols {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .ai-mini {
      background: #f7fbff;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 8px;
      font-size: 10.7px;
      line-height: 1.35;
    }
    .ai-mini strong { display: block; color: var(--blue-900); margin-bottom: 4px; }
    .ask {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 36px;
      gap: 8px;
    }
    .ask input {
      height: 32px;
      border: 1px solid #cddcf4;
      border-radius: 7px;
      padding: 0 10px;
      color: var(--ink);
      min-width: 0;
    }

    .theory-grid {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 14px;
    }
    .canvas {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-template-rows: repeat(3, minmax(106px, 1fr));
      gap: 12px;
      position: relative;
    }
    .theory-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 13px;
      min-width: 0;
      overflow: hidden;
      position: relative;
    }
    .theory-card.center {
      border-style: dashed;
      display: grid;
      place-items: center;
      text-align: center;
      background: #fff;
    }
    .theory-card.warn { background: #fff7ef; border-color: #ffd8ad; }
    .theory-card.next { background: #f1fff6; border-color: #bdebcf; }
    .card-title {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--blue-900);
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 9px;
    }
    .card-text {
      color: var(--ink);
      font-size: 11.7px;
      line-height: 1.48;
      margin: 0;
    }
    .bullet-list {
      margin: 0;
      padding-left: 17px;
      color: var(--ink);
      font-size: 11.7px;
      line-height: 1.55;
    }
    .tag-row {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 7px;
      align-items: center;
      font-size: 11px;
      margin-top: 7px;
    }
    .tag { border-radius: 6px; padding: 5px 7px; font-weight: 850; text-align: center; background: var(--blue-100); color: var(--blue-900); }
    .tag.green { background: #eaf9f0; color: var(--green); }
    .tag.purple { background: #efe8ff; color: var(--purple); }

    .knowledge-grid {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, .68fr);
      gap: 14px;
    }
    .knowledge-left {
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(275px, 1fr) minmax(130px, .48fr);
      gap: 12px;
    }
    .knowledge-right {
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(210px, .88fr) minmax(180px, .82fr);
      gap: 12px;
    }
    .saved-list .list-row { grid-template-columns: 28px minmax(0, 1fr) auto; min-height: 35px; }

    .footer {
      min-width: 0;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      padding: 0 24px;
      color: var(--muted);
      border-top: 1px solid var(--line);
      background: #edf5ff;
      font-size: 11px;
    }
    .footer .links { justify-self: end; display: flex; gap: 18px; white-space: nowrap; }
    .mobile-notice { display: none; color: var(--orange); font-weight: 800; }

    .toast-wrap {
      position: fixed;
      right: 18px;
      bottom: 52px;
      z-index: 50;
      display: grid;
      gap: 8px;
    }
    .toast {
      max-width: 340px;
      padding: 10px 12px;
      border-radius: var(--radius);
      color: #fff;
      background: var(--blue-950);
      box-shadow: 0 14px 30px rgba(5,31,99,.25);
      font-size: 12px;
      font-weight: 750;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(8, 28, 73, .28);
      backdrop-filter: blur(5px);
      z-index: 40;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      width: min(690px, 94vw);
      max-height: min(610px, 90vh);
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 24px 80px rgba(5, 31, 99, .28);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
    }
    .modal-head, .modal-foot {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
    }
    .modal-foot { border-top: 1px solid var(--line); border-bottom: 0; }
    .modal-title { display: flex; align-items: center; gap: 10px; }
    .modal-title strong { display: block; color: var(--blue-900); font-size: 17px; }
    .modal-title span { color: var(--muted); font-size: 12px; }
    .modal-body {
      min-height: 0;
      overflow: hidden;
      display: grid;
      gap: 8px;
      padding: 10px 14px;
    }
    .evidence-row {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      min-height: 86px;
      display: grid;
      grid-template-columns: 86px minmax(0, 1fr) minmax(180px, .72fr) auto;
      gap: 12px;
      align-items: center;
    }
    .thumb {
      height: 64px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, #586c88, #182946);
      font-size: 24px;
      font-weight: 900;
      position: relative;
      overflow: hidden;
    }
    .thumb.phone, .thumb.doc, .thumb.person { background: #eef4ff; color: var(--blue-900); }
    .thumb small {
      position: absolute;
      right: 5px;
      bottom: 4px;
      font-size: 10px;
      color: #fff;
      background: rgba(0,0,0,.45);
      border-radius: 4px;
      padding: 1px 4px;
    }
    .ev-title { color: var(--blue-950); font-size: 12.5px; font-weight: 900; margin-bottom: 6px; }
    .ev-meta { display: grid; gap: 4px; color: var(--muted); font-size: 10.8px; line-height: 1.25; }
    .ev-meta b { color: var(--blue-900); }

    @media (max-height: 800px) {
      :root { --topbar: 48px; --footer: 34px; }
      .content { padding: 10px 18px 9px; gap: 9px; }
      .sidebar { padding-top: 16px; gap: 12px; }
      .mark { width: 50px; height: 56px; margin-bottom: 8px; }
      .brand-title { font-size: 13px; }
      .nav button { min-height: 32px; padding: 7px 10px; font-size: 11.5px; }
      h1 { font-size: 25px; }
      .subtitle { font-size: 12px; margin-top: 4px; }
      .summary-strip { min-height: 72px; }
      .summary-cell { padding: 10px 16px; grid-template-columns: 40px 1fr; }
      .orb { width: 40px; height: 40px; }
      .kpi { min-height: 66px; padding: 10px 15px; grid-template-columns: 40px 1fr; }
      .kpi .value { font-size: 21px; }
      .hero-actions { gap: 12px; }
      .home-card { padding: 15px 18px; gap: 10px; }
      .home-card .orb { width: 62px; height: 62px; }
      .home-card h2 { font-size: 18px; }
      .home-card p { font-size: 12.5px; }
      .home-grid { grid-template-rows: minmax(175px, .9fr) minmax(174px, .86fr); }
      .home-bottom { gap: 10px; }
      .pad { padding: 11px; }
      .left-stack { grid-template-rows: minmax(250px, 1fr) minmax(122px, .45fr); }
      .right-stack { grid-template-rows: minmax(198px, .88fr) minmax(170px, .82fr); }
      .filters { gap: 7px; margin-bottom: 8px; }
      td { height: 32px; font-size: 10.5px; padding: 0 7px; }
      th { height: 29px; padding: 0 7px; }
      .table-foot { height: 30px; }
      .canvas { grid-template-rows: repeat(3, minmax(92px, 1fr)); gap: 10px; }
      .theory-card { padding: 10px; }
      .card-title { font-size: 12.8px; margin-bottom: 6px; }
      .card-text, .bullet-list { font-size: 10.8px; line-height: 1.42; }
      .ai-cols { gap: 6px; }
      .bubble, .ai-mini { font-size: 10.5px; }
      .quick-grid .btn { min-height: 48px; }
      .case-mini { padding: 11px; }
    }

    @media (max-width: 980px) {
      :root { --sidebar: 62px; }
      .brand-title, .brand-acronym, .nav span, .case-mini, .collapse span { display: none; }
      .sidebar { padding-left: 9px; padding-right: 9px; align-items: center; }
      .mark { width: 42px; height: 48px; }
      .nav button { justify-content: center; padding: 8px; }
      .topbar { grid-template-columns: minmax(0, 1fr) auto; padding: 8px 12px; }
      .search { display: none; }
      .legal-top { left: 70px; right: 12px; text-align: left; }
      .main-two, .theory-grid, .knowledge-grid { grid-template-columns: 1fr; }
      .right-stack, .knowledge-right, .theory-grid > .ai-panel { display: none; }
      .home-bottom { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 720px) {
      .top-actions .icon-btn:nth-child(2), .user span { display: none; }
      .content { padding: 9px; }
      .head { grid-template-columns: 1fr; }
      .actions { justify-content: start; overflow: hidden; }
      .hero-actions, .kpis, .summary-strip, .summary-strip.four, .home-bottom, .bottom-split {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .home-grid { grid-template-rows: 1fr 1fr; }
      .home-card p { display: none; }
      .home-card .btn { width: 100%; }
      .filters, .filters.four { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .table-wrap { font-size: 10px; }
      table th:nth-child(n+5), table td:nth-child(n+5) { display: none; }
      .canvas { grid-template-columns: repeat(2, minmax(0, 1fr)); grid-template-rows: repeat(4, minmax(78px, 1fr)); }
      .summary-cell { padding: 9px; grid-template-columns: 34px 1fr; }
      .orb { width: 34px; height: 34px; }
      .mobile-notice { display: block; }
      .footer { grid-template-columns: 1fr; padding: 0 10px; }
      .footer .links, .footer > div:nth-child(2) { display: none; }
      .evidence-row { grid-template-columns: 56px minmax(0,1fr); }
      .evidence-row > .ev-meta, .evidence-row > div:last-child { grid-column: 1 / -1; }
    }
  </style>
</head>

      return `<div class="panel summary-strip ${cols === 4 ? "four" : ""}">${data.map(d => `<div class="summary-cell"><div class="orb ${d[4] || ""}">${icon(d[0])}</div><div><div class="label">${d[1]}</div><div class="value">${d[2]}</div>${d[3] ? `<div class="tiny"><span class="status-dot green"></span>${d[3]}</div>` : ""}</div></div>`).join("")}</div>`;
    }

    function kpis(items) {
      return `<div class="kpis">${items.map(i => `<div class="panel kpi"><div class="orb ${i[4] || ""}">${icon(i[0])}</div><div><div class="label">${i[1]}</div><div class="value">${i[2]}</div><div class="tiny ${i[4] || ""}">${i[3] || ""}</div></div></div>`).join("")}</div>`;
    }

    function inicio() {
      const date = `<div class="panel pad" style="min-width:220px;display:grid;grid-template-columns:42px 1fr;gap:10px;align-items:center">${icon("calendar")}<div><div class="value" style="font-size:14px">15 de abril de 2024</div><div class="tiny">Lunes, 09:15 a. m.</div></div></div>`;
      return `<section class="content">${header("Bienvenido, Doctor", "Accede rápidamente a las funciones principales del sistema.", date)}
        <div class="screen home-grid">
          <div class="hero-actions">${DEMO_DATA.homeCards.map(([t, p, b, ic, tone, target]) => `<article class="panel home-card"><div class="orb ${tone}">${icon(ic)}</div><h2>${t}</h2><p>${p}</p><button class="btn primary" data-screen="${target}">${b} ${icon("external")}</button></article>`).join("")}</div>
          <div class="home-bottom">
            <div class="panel pad"><div class="section-head"><h2 class="section-title">Casos recientes</h2><button class="btn small" data-screen="gestion">Ver todos</button></div><div class="list">${DEMO_DATA.recentCases.map(r => `<div class="list-row">${icon("folder")}<div><strong>${r[0]}</strong><div class="tiny">${r[1]}</div></div><div class="tiny">${r[2]}<br><span class="status-dot ${r[4]}"></span>${r[3]}</div></div>`).join("")}</div><button class="btn ghost" data-screen="gestion" style="width:100%;margin-top:8px">Ir a Gestión de casos ${icon("external")}</button></div>
            <div class="panel pad"><h2 class="section-title">Accesos rápidos</h2><div class="list quick-list">${["Crear caso nuevo", "Mis asignaciones", "Documentos recientes", "Plantillas y formatos"].map((x, i) => `<button class="list-row" data-toast="${x} simulado.">${icon("doc")}<div><strong>${x}</strong><div class="tiny">${["Iniciar un nuevo expediente fiscal", "Casos asignados actualmente", "Últimos documentos consultados", "Modelos y documentos estándar"][i]}</div></div><span>›</span></button>`).join("")}</div></div>
            <div class="panel pad"><div class="section-head"><h2 class="section-title">Asistencia IA-Legal</h2><span class="pill orange">Beta</span></div><div class="tiny">Apoyo para análisis, síntesis y orientación jurídica asistida.</div><div class="ia-illustration">IA</div><button class="btn primary" style="width:100%" data-toast="Asistencia IA-Legal simulada.">Abrir asistencia ${icon("external")}</button></div>
            <div class="panel pad" style="display:grid;place-items:center;text-align:center"><div><div class="orb green" style="margin:0 auto 12px;width:70px;height:70px">${icon("folder")}</div><h2 class="section-title">${DEMO_DATA.case.id}</h2><div class="tiny">${DEMO_DATA.case.crime}<br>Actualizado: ${DEMO_DATA.case.updated}</div><button class="btn ghost" data-screen="teoria" style="margin-top:18px">Continuar ${icon("external")}</button></div></div>
          </div>
        </div></section>`;
    }

    function gestion() {
      const actions = `<button class="btn primary" data-toast="Nuevo caso simulado.">${icon("plus")} Nuevo caso</button>`;
      return `<section class="content">${header("Gestión de casos", "Administra, consulta y da seguimiento a los expedientes fiscales.", actions)}
        <div class="screen" style="grid-template-rows:auto auto minmax(0,1fr)">
          ${kpis([["folder","Casos activos","124","+8 desde ayer",""],["alert","Casos urgentes","9","Requieren atención inmediata","gold"],["calendar","Audiencias próximas","6","Próxima: hoy, 10:30 a. m.","purple"],["clock","Plazos por vencer","15","En los próximos 7 días","green"]])}
          <div class="main-two">
            <div class="left-stack">
              ${caseTablePanel()}
              <div class="bottom-split">${recentPanel("Últimas actuaciones")}${quickPanel(DEMO_DATA.actions)}</div>
            </div>
            <div class="right-stack">${caseSummaryPanel()}${aiPanel("gestion")}</div>
          </div>
        </div></section>`;
    }

    function caseTablePanel() {
      return `<div class="panel pad"><div class="section-head"><h2 class="section-title">Listado de casos</h2><button class="btn primary" data-toast="Nuevo caso simulado.">${icon("plus")} Nuevo caso</button></div>${filters(["Estado","Prioridad","Etapa procesal","Delito"], "Buscar caso...")}<div class="table-wrap"><table><thead><tr><th>Expediente</th><th>Delito</th><th>Investigado / Imputado</th><th>Fiscal</th><th>Etapa</th><th>Prioridad</th><th>Fecha límite</th><th>Estado</th><th>Acciones</th></tr></thead><tbody>${DEMO_DATA.caseRows.map((r, i) => `<tr class="${i === 0 ? "selected" : ""}"><td><b>${r[0]}</b></td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${priority(r[5])}</td><td>${r[6]}</td><td>${status(r[7])}</td><td>${rowActions()}</td></tr>`).join("")}</tbody></table><div class="table-foot"><span>Mostrando 6 de 124 casos</span>${pages("21")}</div></div></div>`;
    }

    function jurisprudencia() {
      return knowledgeScreen({
        id: "jurisprudencia",
        title: "Jurisprudencia",
        subtitle: "Consulta precedentes, criterios jurisprudenciales y fundamentos aplicables al caso seleccionado.",
        kpiItems: [["doc","Resultados encontrados","248","",""],["scale","Jurisprudencia vinculante","18","","green"],["scale","Casaciones relevantes","36","","gold"],["target","Coincidencias con el caso","12","","purple"]],
        tableTitle: "Buscar jurisprudencia",
        filters: ["Fuente penal","Sala","Tipo de resolución","Delito","Año"],
        rows: DEMO_DATA.jurisprudencia,
        columns: ["Expediente / Casación","Tema","Sala","Año","Relevancia","Acciones"],
        detailTitle: "Resumen del criterio seleccionado",
        selectedTitle: "Cas. N.° 626-2022/Lima",
        aiKey: "jurisprudencia"
      });
    }

    function normativa() {
      return knowledgeScreen({
        id: "normativa",
        title: "Normativa",
        subtitle: "Consulta normas, artículos y fundamentos legales aplicables al caso seleccionado.",
        kpiItems: [["book","Normas encontradas","124","",""],["doc","Artículos relevantes","37","","green"],["external","Normas vinculadas","18","","gold"],["target","Coincidencias con el caso","9","","purple"]],
        tableTitle: "Buscar normativa",
        filters: ["Tipo de norma","Materia","Año"],
        rows: DEMO_DATA.normativa,
        columns: ["Norma","Artículo/tema","Materia","Relevancia","Acciones"],
        detailTitle: "Resumen de la norma seleccionada",
        selectedTitle: "Código Penal – arts. 188 y 189",
        aiKey: "normativa"
      });
    }

    function historial() {
      return `<section class="content">${header("Historial", "Consulta actuaciones, cambios y trazabilidad del caso seleccionado.")}
        <div class="screen" style="grid-template-rows:auto auto minmax(0,1fr)">
          ${caseStrip(4)}
          ${kpis([["doc","Registros totales","186","",""],["clock","Actuaciones recientes","24","","green"],["user","Usuarios intervinientes","12","","gold"],["target","Cambios relevantes","8","","purple"]])}
          <div class="knowledge-grid">
            <div class="knowledge-left">
              <div class="panel pad"><h2 class="section-title">Buscar historial</h2>${filters(["Tipo de evento","Usuario","Módulo","Fecha"], "Buscar actuación o documento...")}<div class="table-wrap"><table><thead><tr><th>Fecha y hora</th><th>Evento</th><th>Caso</th><th>Usuario</th><th>Módulo</th><th>Relevancia</th><th>Acciones</th></tr></thead><tbody>${DEMO_DATA.historial.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${priority(r[5])}</td><td>${rowActions()}</td></tr>`).join("")}</tbody></table><div class="table-foot"><span>Mostrando 1–5 de 186 resultados</span>${pages("38")}</div></div></div>
              <div class="bottom-split">${savedPanel("Actividad guardada / reciente")}${quickPanel([["Exportar historial","download"],["Generar reporte","doc"],["Agregar a teoría del caso","folder"],["Ver trazabilidad","scale"]], "two")}</div>
            </div>
            <div class="knowledge-right">${historyDetail()}${aiPanel("historial")}</div>
          </div>
        </div></section>`;
    }

    function teoria() {
      const actions = `<button class="btn ghost" data-toast="Análisis guardado en modo demo.">${icon("doc")} Guardar</button><button class="btn ghost" data-toast="Exportación simulada.">${icon("download")} Exportar teoría</button><button class="btn primary" data-toast="Edición simulada.">${icon("edit")} Editar</button>`;
      return `<section class="content">${header("Teoría del caso", "Construye y organiza la estrategia jurídica del caso seleccionado.", actions)}
        <div class="screen" style="grid-template-rows:auto minmax(0,1fr)">
          ${caseStrip()}
          <div class="theory-grid">
            <div class="panel pad"><div class="canvas">${DEMO_DATA.theoryCards.map((c, i) => theoryCard(c, i)).join("")}</div></div>
            ${aiPanel("teoria", true)}
          </div>
        </div></section>`;
    }

    function theoryCard(c, i) {
      const extra = i === 5 ? `<button class="btn ghost small" data-open-evidence style="margin-top:10px">Ver evidencias ${icon("external")}</button>` : "";
      const cls = i === 1 ? " center" : i === 7 ? " warn" : i === 8 ? " next" : "";
      const body = i === 4 ? `<ul class="bullet-list">${c[1].split(". ").filter(Boolean).map(x => `<li>${x.replace(".", "")}</li>`).join("")}</ul>` : i === 6 ? `<div class="tag-row"><span class="tag">Documental</span><span>Actas, registros y reportes policiales.</span><span class="tag green">Testimonial</span><span>Declaraciones de víctima y testigos.</span><span class="tag purple">Material</span><span>Videos, arma incautada, celulares.</span></div>` : `<p class="card-text">${c[1]}</p>`;
      return `<article class="theory-card${cls}"><div>${i === 1 ? `<div class="orb" style="margin:0 auto 10px">${icon(c[2])}</div>` : `<div class="card-title">${icon(c[2])}<span>${c[0]}</span></div>`}${i === 1 ? `<h2 class="section-title">${c[0]}</h2>` : ""}${body}${extra}</div></article>`;
    }

    function knowledgeScreen(cfg) {
      return `<section class="content">${header(cfg.title, cfg.subtitle)}
        <div class="screen" style="grid-template-rows:auto auto minmax(0,1fr)">
          ${caseStrip(4)}
          ${kpis(cfg.kpiItems)}
          <div class="knowledge-grid">
            <div class="knowledge-left">
              <div class="panel pad"><h2 class="section-title">${cfg.tableTitle}</h2>${filters(cfg.filters, `Buscar ${cfg.id}...`, cfg.filters.length === 3)}${knowledgeTable(cfg)}</div>
              <div class="bottom-split">${savedPanel(`${cfg.title} guardada / reciente`)}${quickPanel([["Comparar normas","scale"],["Exportar ficha","download"],["Agregar a teoría del caso","folder"],["Ver texto legal","external"]], "two")}</div>
            </div>
            <div class="knowledge-right">${knowledgeDetail(cfg)}${aiPanel(cfg.aiKey)}</div>
          </div>
        </div></section>`;
    }

    function knowledgeTable(cfg) {
      return `<div class="table-wrap"><table><thead><tr>${cfg.columns.map(c => `<th>${c}</th>`).join("")}</tr></thead><tbody>${cfg.rows.map((r, i) => `<tr class="${i === 0 ? "selected" : ""}">${r.map((x, idx) => `<td>${idx === 4 || idx === 3 && cfg.id === "normativa" ? priority(x) : idx === 0 ? `<b>${x}</b>` : x}</td>`).join("")}<td>${rowActions()}</td></tr>`).join("")}</tbody></table><div class="table-foot"><span>Mostrando resultados principales</span>${pages(cfg.id === "jurisprudencia" ? "50" : "31")}</div></div>`;
    }

    function filters(names, placeholder, compact = false) {
      return `<div class="filters ${compact ? "four" : ""}">${names.map(n => `<label class="filter-label">${n}<select><option>Todas</option><option>Alta</option></select></label>`).join("")}<label class="filter-label">Palabras clave<div class="filter-input">${icon("search")}<span>${placeholder}</span></div></label></div>`;
    }

    function caseSummaryPanel() {
      return `<div class="panel pad"><div class="section-head"><h2 class="section-title">Resumen del caso seleccionado</h2><span class="pill">${DEMO_DATA.case.id}</span></div><div class="detail-grid">
        ${[["Delito",DEMO_DATA.case.crime],["Fiscal asignado","Doctor"],["Etapa actual",DEMO_DATA.case.stage],["Plazo límite","20/04/2024 (5 días)"],["Última actuación","Solicitud de formalización presentada"],["Evidencias registradas","12 documentos"],["Riesgo del caso","Alto"],["Próxima audiencia","Audiencia de formalización"]].map((r, i) => `<div class="${i === 4 ? "wide" : ""}"><div class="detail-label">${r[0]}</div><div class="detail-value">${r[1]}</div></div>`).join("")}
      </div><h2 class="section-title" style="margin-top:16px">Hitos del caso</h2><div class="timeline-mini">${["Investigación inicial","Recolección de evidencias","Formalización","Acusación","Juicio"].map((s, i) => `<div class="step ${i < 2 ? "done" : i === 2 ? "active" : ""}"><span>${i+1}</span><div>${s}</div></div>`).join("")}</div></div>`;
    }

    function knowledgeDetail(cfg) {
      return `<div class="panel pad"><div class="section-head"><h2 class="section-title">${cfg.detailTitle}</h2><span class="pill red">Alta coincidencia</span></div><h2 class="section-title">${cfg.selectedTitle}</h2><div class="detail-grid">
        <div><div class="detail-label">Tipo</div><div class="detail-value">${cfg.id === "normativa" ? "Ley" : "Casación"}</div></div>
        <div><div class="detail-label">Materia</div><div class="detail-value">Derecho Penal</div></div>
        <div class="wide"><div class="detail-label">Relación con el caso</div><div class="detail-value">Define el criterio aplicable para sostener la imputación por robo agravado y sus circunstancias específicas.</div></div>
        <div><div class="detail-label">Nivel de coincidencia</div><div class="detail-value"><span class="status-dot orange"></span>Alta</div></div>
      </div><div class="bottom-split" style="margin-top:12px"><div class="panel pad" style="box-shadow:none"><div class="section-title">Normativa relacionada</div><ul class="bullet-list"><li>Código Penal, arts. 188 y 189.</li><li>Código Procesal Penal, arts. 159 y 160.</li></ul></div><div class="panel pad" style="box-shadow:none"><div class="section-title">Citas clave</div><ul class="bullet-list"><li>Uso de arma y amenaza.</li><li>Desapoderamiento e intimidación.</li></ul></div></div></div>`;
    }

    function historyDetail() {
      return `<div class="panel pad"><div class="section-head"><h2 class="section-title">Detalle del registro seleccionado</h2><span class="pill red">Alta</span></div><h2 class="section-title">${DEMO_DATA.historial[0][1]}</h2><div class="detail-grid">${[["Fecha","10/04/2024 10:45 a. m."],["Usuario","Doctor"],["Módulo","Gestión de casos"],["Caso",DEMO_DATA.case.id],["Documento relacionado","Disposición fiscal de formalización"],["Estado","Registrado"]].map(r => `<div><div class="detail-label">${r[0]}</div><div class="detail-value">${r[1]}</div></div>`).join("")}<div class="wide"><div class="detail-label">Impacto en el caso</div><div class="detail-value">Impulsa el avance a formalización, vincula medios probatorios y refuerza la teoría fiscal.</div></div></div><button class="btn ghost" data-toast="Registro simulado." style="margin-top:12px">Ver registro ${icon("external")}</button></div>`;
    }

    function aiPanel(key, tall = false) {
      return `<div class="panel pad ai-panel"><div class="ai-title"><span>${icon("target")} Asistencia IA-Legal</span><span class="online"><span class="status-dot green"></span>En línea</span></div><div class="chat"><div class="tiny">Consulta sobre este caso</div><div class="bubble">¿Qué ${key === "teoria" ? "normativa es aplicable al caso" : "análisis fortalece este caso"}?</div><div class="bubble response">${DEMO_DATA.ai[key]}</div><div class="ai-cols"><div class="ai-mini"><strong>Normativa aplicable</strong>CP: arts. 188 y 189<br>CPP: arts. 159 y 160</div><div class="ai-mini"><strong>Teorías sugeridas</strong>Autoría directa<br>Apoderamiento</div><div class="ai-mini"><strong>Líneas de sustento</strong>Video, testimonio e incautación</div></div>${tall ? `<button class="btn ghost" data-toast="Análisis completo simulado." style="justify-self:center">Ver análisis completo ${icon("external")}</button>` : ""}</div><div class="ask"><input placeholder="Escribe tu consulta..."><button class="btn primary" data-toast="Consulta IA simulada.">${icon("send")}</button></div></div>`;
    }

    function recentPanel(title) {
      return `<div class="panel pad"><div class="section-head"><h2 class="section-title">${title}</h2><button class="btn small" data-toast="Listado simulado.">Ver todas</button></div><div class="list">${DEMO_DATA.historial.slice(0,4).map(r => `<div class="list-row" style="grid-template-columns:minmax(120px,.6fr) minmax(0,1fr) minmax(80px,.45fr)"><div class="tiny">${r[0]}</div><strong>${r[1]}</strong><div class="tiny">${r[3]}</div></div>`).join("")}</div></div>`;
    }

    function savedPanel(title) {
      return `<div class="panel pad saved-list"><div class="section-head"><h2 class="section-title">${title}</h2></div><div class="list">${["Código Penal – arts. 188 y 189","Código Procesal Penal – arts. 159, 160, 313 y 314","Constitución Política – tutela jurisdiccional"].map((x, i) => `<div class="list-row">${icon("book")}<strong>${x}</strong><span class="tiny">${i ? "Ayer" : "Hoy"}</span></div>`).join("")}</div><button class="btn ghost" data-toast="Guardados simulados." style="width:100%;margin-top:8px">Ver todas las guardadas (18) ${icon("external")}</button></div>`;
    }

    function quickPanel(items, variant = "") {
      return `<div class="panel pad"><h2 class="section-title">Acciones rápidas</h2><div class="quick-grid ${variant}">${items.map(([t, ic]) => `<button class="btn ghost" data-toast="${t} simulado.">${icon(ic)}<span>${t}</span></button>`).join("")}</div></div>`;
    }

    function priority(v) {
      const tone = v === "Urgente" || v === "Alta" ? "red" : v === "Media" ? "orange" : v === "Baja" ? "" : "red";
      return `<span class="pill ${tone}">${v}</span>`;
    }
    function status(v) {
      const tone = v === "En trámite" ? "green" : v === "En análisis" ? "" : "orange";
      return `<span class="pill ${tone}">${v}</span>`;
    }
    function rowActions() {
      return `<button class="icon-btn" data-toast="Ver simulado." aria-label="Ver">${icon("eye")}</button><button class="icon-btn" data-toast="Editar simulado." aria-label="Editar">${icon("edit")}</button><button class="icon-btn" data-toast="Abrir simulado." aria-label="Abrir">${icon("external")}</button>`;
    }
    function pages(last) {
      return `<div class="pages"><button class="page">‹</button><button class="page active">1</button><button class="page">2</button><button class="page">3</button><span>...</span><button class="page">${last}</button><button class="page">›</button></div>`;
    }

    function evidenceModal() {
      return `<div class="modal" role="dialog" aria-modal="true" aria-label="Evidencias del caso">
        <div class="modal-head"><div class="modal-title"><div class="orb">${icon("folder")}</div><div><strong>Evidencias del caso</strong><span>Caso: ${DEMO_DATA.case.id}</span></div></div><div class="actions"><button class="btn ghost" data-toast="Agregar evidencia simulado.">${icon("plus")} Agregar evidencia</button><button class="icon-btn" data-close-modal aria-label="Cerrar">${icon("close")}</button></div></div>
        <div class="modal-body">${DEMO_DATA.evidence.map((e, i) => `<div class="evidence-row"><div class="thumb ${i === 1 ? "phone" : i === 2 ? "doc" : i === 3 ? "person" : ""}">${i === 0 ? "▶<small>02:14</small>" : icon(i === 1 ? "phone" : i === 3 ? "user" : "doc")}</div><div><div class="ev-title">${i+1}. ${e[0]}</div><div class="ev-meta"><span><b>Archivo:</b> ${e[1]}</span><span><b>Duración:</b> ${e[2]}</span><span><b>Captura:</b> ${e[3]}</span></div></div><div class="ev-meta"><span><b>Fuente:</b> ${e[4]}</span><span><b>Fecha:</b> ${e[5]}</span><span><b>Responsable:</b> ${e[6]}</span></div><div style="display:grid;gap:8px"><button class="btn ghost small" data-toast="${e[7]} simulado.">${e[7]}</button><button class="btn ghost small" data-toast="Descargar simulado.">Descargar</button></div></div>`).join("")}</div>
        <div class="modal-foot"><span class="tiny">4 evidencias</span><button class="btn primary" data-screen="teoria" data-close-modal>Ir a página de evidencias ${icon("external")}</button></div>
      </div>`;
    }

    function bind() {
      document.querySelectorAll("[data-screen]").forEach(el => el.addEventListener("click", () => {
        const target = el.dataset.screen;
        if (target) state.screen = target;
        state.modal = false;
        app();
      }));
      document.querySelectorAll("[data-toast]").forEach(el => el.addEventListener("click", ev => {
        ev.stopPropagation();
        toast(el.dataset.toast);
      }));
      document.querySelectorAll("[data-open-evidence]").forEach(el => el.addEventListener("click", () => {
        state.modal = true;
        app();
      }));
      document.querySelectorAll("[data-close-modal]").forEach(el => el.addEventListener("click", () => {
        state.modal = false;
        app();
      }));
      document.getElementById("modal").addEventListener("click", ev => {
        if (ev.target.id === "modal") {
          state.modal = false;
          app();
        }
      });
      document.querySelectorAll(".search input, .ask input").forEach(input => input.addEventListener("keydown", ev => {
        if (ev.key === "Enter") toast("Búsqueda simulada para demo.");
      }));
      document.addEventListener("keydown", ev => {
        if (ev.key === "Escape" && state.modal) {
          state.modal = false;
          app();
        }
      }, { once: true });
    }

    function toast(message) {
      const wrap = document.getElementById("toasts");
      const node = document.createElement("div");
      node.className = "toast";
      node.textContent = message || "Función disponible en el MVP.";
      wrap.appendChild(node);
      setTimeout(() => node.remove(), 2600);
    }

    app();
  </script>
</body>
</html>
