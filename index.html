<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Herramienta de Analisis Fiscal / FCIS</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <style>
    :root {
      --blue-950: #051f63;
      --blue-900: #0735b7;
      --blue-800: #0b48de;
      --blue-700: #1558ff;
      --blue-100: #eef5ff;
      --blue-050: #f7fbff;
      --gold: #ffad18;
      --green: #13a65b;
      --orange: #ff8a00;
      --red: #ff4141;
      --purple: #8d35ff;
      --ink: #06286f;
      --muted: #5570ad;
      --line: #d9e6fb;
      --panel: #ffffff;
      --bg: #f7fbff;
      --shadow: 0 10px 26px rgba(7, 53, 183, .07);
      --sidebar: 196px;
      --sidebar-collapsed: 68px;
      --topbar: 54px;
      --footer: 38px;
      --radius: 8px;
      --ease: 180ms ease;
    }

    html, body, #app {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      letter-spacing: 0;
    }

    * { box-sizing: border-box; }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    button:focus-visible, input:focus-visible, select:focus-visible {
      outline: 3px solid rgba(21, 88, 255, .24);
      outline-offset: 2px;
    }

    #app {
      display: grid;
      grid-template-columns: var(--sidebar) minmax(0, 1fr);
      background: linear-gradient(180deg, #fbfdff, #f4f9ff);
      transition: grid-template-columns var(--ease);
    }

    #app.sidebar-collapsed {
      grid-template-columns: var(--sidebar-collapsed) minmax(0, 1fr);
    }

    .sidebar {
      min-width: 0;
      height: 100vh;
      overflow: hidden;
      background: #fff;
      border-right: 1px solid var(--line);
      padding: 22px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: padding var(--ease);
    }

    .brand { text-align: center; color: var(--blue-950); font-weight: 850; }
    .mark {
      width: 58px;
      height: 66px;
      margin: 0 auto 12px;
      display: grid;
      place-items: center;
      background: linear-gradient(160deg, #0642e5, #032f9d);
      color: var(--gold);
      clip-path: polygon(50% 0, 91% 18%, 84% 72%, 50% 100%, 16% 72%, 9% 18%);
      box-shadow: 0 12px 22px rgba(6, 66, 229, .19);
    }
    .brand-title { font-size: 15px; line-height: 1.08; }
    .brand-acronym { margin-top: 6px; font-size: 10px; color: var(--muted); letter-spacing: 1px; }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 7px;
      min-height: 0;
      overflow: hidden;
    }

    .nav button {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--blue-950);
      min-height: 38px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 11px;
      border-radius: var(--radius);
      font-size: 12.5px;
      font-weight: 800;
      text-align: left;
      transition: background var(--ease), color var(--ease), box-shadow var(--ease), transform var(--ease);
    }

    .nav button:hover { background: #f4f8ff; transform: translateX(1px); }

    .nav button.active {
      background: #edf4ff;
      color: var(--blue-800);
      box-shadow: inset 3px 0 0 var(--blue-700);
    }

    .ico {
      width: 20px;
      height: 20px;
      flex: 0 0 20px;
      color: currentColor;
    }

    .case-mini {
      margin-top: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      background: #fff;
      color: var(--muted);
      box-shadow: 0 8px 18px rgba(7, 53, 183, .04);
      font-size: 12px;
    }
    .case-mini strong {
      display: block;
      color: var(--blue-900);
      font-size: 16px;
      margin: 7px 0 4px;
    }
    .case-mini .btn { width: 100%; margin-top: 12px; }
    .collapse {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: #fff;
      color: var(--blue-900);
      font-size: 24px;
      font-weight: 750;
      line-height: 1;
      display: grid;
      place-items: center;
      align-items: center;
      padding: 0 0 2px;
      box-shadow: 0 8px 18px rgba(7, 53, 183, .06);
      transition: transform var(--ease), border-color var(--ease), box-shadow var(--ease), background var(--ease);
    }
    .collapse:hover {
      background: #f4f8ff;
      border-color: #aecaef;
      box-shadow: 0 12px 24px rgba(7, 53, 183, .11);
      transform: translateY(-1px);
    }
    .collapse:active { transform: translateY(0); }

    .legal-side {
      color: var(--muted);
      font-size: 9.5px;
      line-height: 1.35;
      border-top: 1px solid var(--line);
      padding-top: 9px;
    }

    #app.sidebar-collapsed .sidebar { align-items: center; padding-left: 9px; padding-right: 9px; }
    #app.sidebar-collapsed .brand-title,
    #app.sidebar-collapsed .brand-acronym,
    #app.sidebar-collapsed .nav span,
    #app.sidebar-collapsed .case-mini,
    #app.sidebar-collapsed .legal-side { display: none; }
    #app.sidebar-collapsed .mark { width: 42px; height: 48px; }
    #app.sidebar-collapsed .nav button { justify-content: center; padding: 8px; }
    #app.sidebar-collapsed .collapse { justify-content: center; }

    .main {
      min-width: 0;
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-rows: var(--topbar) minmax(0, 1fr) var(--footer);
    }

    .topbar {
      position: relative;
      min-width: 0;
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(180px, 1fr) minmax(290px, 460px) auto;
      align-items: center;
      gap: 18px;
      padding: 8px 24px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #f2f7ff, #edf5ff);
    }

    .crumb {
      color: var(--blue-800);
      font-size: 12.5px;
      font-weight: 850;
      white-space: nowrap;
    }

    .search {
      height: 34px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #cddcf4;
      background: #fff;
      border-radius: var(--radius);
      padding: 0 12px;
      color: var(--muted);
      min-width: 0;
    }
    .search input {
      min-width: 0;
      flex: 1;
      border: 0;
      outline: 0;
      color: var(--ink);
      font-size: 12.5px;
    }
    .keycap {
      padding: 1px 6px;
      border-radius: 6px;
      background: var(--blue-100);
      color: var(--blue-900);
      font-size: 11px;
      font-weight: 800;
    }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      white-space: nowrap;
    }
    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid transparent;
      background: transparent;
      color: var(--blue-900);
      display: grid;
      place-items: center;
      position: relative;
      transition: background var(--ease), transform var(--ease), border-color var(--ease), box-shadow var(--ease);
    }
    .icon-btn:hover { background: #edf4ff; border-color: #cddcf4; transform: translateY(-1px); }
    .dot {
      position: absolute;
      top: 4px;
      right: 5px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gold);
    }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: white;
      background: var(--blue-900);
      font-weight: 900;
    }
    .user {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--blue-950);
      font-size: 13px;
      font-weight: 850;
    }
    .content {
      min-height: 0;
      overflow: hidden;
      padding: 14px 22px 12px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
    }

    .head {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: start;
    }
    h1 {
      margin: 0;
      color: var(--blue-900);
      font-size: clamp(25px, 2vw, 34px);
      line-height: 1.05;
      font-weight: 900;
    }
    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }
    .actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }

    .screen {
      min-height: 0;
      overflow: hidden;
      display: grid;
      gap: 12px;
    }

    .panel {
      min-width: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .panel.highlight-step {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(255, 173, 24, .22), 0 16px 32px rgba(7, 53, 183, .14);
    }
    .pad { padding: 14px; }

    .btn {
      min-height: 34px;
      border-radius: var(--radius);
      border: 1px solid #cddcf4;
      background: #fff;
      color: var(--blue-900);
      padding: 8px 13px;
      font-size: 12.5px;
      font-weight: 850;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
      transition: transform var(--ease), box-shadow var(--ease), border-color var(--ease), background var(--ease);
    }
    .btn:hover { transform: translateY(-1px); border-color: #aecaef; box-shadow: 0 8px 18px rgba(7, 53, 183, .10); }
    .btn:active { transform: translateY(0); box-shadow: none; }
    .btn.primary {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(180deg, #0d4cff, #0636b8);
      box-shadow: 0 9px 18px rgba(7, 53, 183, .18);
    }
    .btn.ghost { background: #f9fcff; }
    .btn.small { min-height: 28px; padding: 6px 9px; font-size: 11.5px; }

    .summary-strip {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      min-height: 86px;
      align-items: center;
    }
    .summary-strip.four { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .summary-cell {
      display: grid;
      grid-template-columns: 46px 1fr;
      gap: 12px;
      align-items: center;
      padding: 14px 20px;
      border-right: 1px solid var(--line);
      min-width: 0;
    }
    .summary-cell:last-child { border-right: 0; }
    .label { color: var(--blue-900); font-size: 11.5px; font-weight: 800; }
    .value { color: var(--blue-900); font-size: 18px; font-weight: 900; margin-top: 2px; }
    .tiny { color: var(--muted); font-size: 11.5px; line-height: 1.35; }

    .orb {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--blue-900);
      background: var(--blue-100);
    }
    .orb.gold { color: var(--orange); background: #fff1d8; }
    .orb.green { color: var(--green); background: #e9f9f0; }
    .orb.purple { color: var(--purple); background: #f2eaff; }

    .kpis {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }
    .kpi {
      min-height: 76px;
      display: grid;
      grid-template-columns: 46px 1fr;
      align-items: center;
      gap: 13px;
      padding: 13px 18px;
    }
    .kpi .value { font-size: 24px; }

    .home-grid {
      grid-template-rows: minmax(210px, .92fr) minmax(190px, .88fr);
      min-height: 0;
    }
    .hero-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      min-height: 0;
    }
    .home-card {
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 14px;
    }
    .home-card .orb { width: 78px; height: 78px; }
    .home-card .orb .ico { width: 42px; height: 42px; }
    .home-card h2 { margin: 0; color: var(--blue-950); font-size: 21px; line-height: 1.1; }
    .home-card p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.42; max-width: 270px; }
    .home-card .btn { width: min(220px, 80%); }
    .home-bottom {
      min-height: 0;
      display: grid;
      grid-template-columns: 1.1fr 1fr .9fr .65fr;
      gap: 14px;
    }

    .list { display: grid; gap: 0; }
    .list-row {
      min-height: 43px;
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) auto;
      gap: 9px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      border-left: 0;
      border-right: 0;
      border-top: 0;
      background: transparent;
      width: 100%;
      text-align: left;
      font-size: 12px;
    }
    .list-row:last-child { border-bottom: 0; }
    .list-row strong { color: var(--blue-900); font-size: 13px; }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      background: var(--green);
    }
    .status-dot.orange { background: var(--orange); }
    .status-dot.blue { background: var(--blue-700); }

    .quick-list .list-row { grid-template-columns: 34px minmax(0, 1fr) 18px; min-height: 40px; }
    .ia-illustration {
      height: 78px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, #dceaff, #f6fbff);
      margin: 12px 0;
      display: grid;
      place-items: center;
      color: var(--blue-700);
      font-weight: 900;
      font-size: 22px;
    }

    .main-two {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1.72fr) minmax(310px, .88fr);
      gap: 14px;
    }
    .left-stack, .right-stack {
      min-height: 0;
      overflow: hidden;
      display: grid;
      gap: 12px;
    }
    .left-stack { grid-template-rows: minmax(270px, 1fr) minmax(130px, .45fr); }
    .right-stack { grid-template-rows: minmax(220px, .9fr) minmax(180px, .8fr); }
    .bottom-split {
      display: grid;
      grid-template-columns: 1fr .95fr;
      gap: 12px;
      min-height: 0;
    }

    .section-title {
      margin: 0 0 10px;
      color: var(--blue-900);
      font-size: 15px;
      line-height: 1.1;
      font-weight: 900;
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 9px;
    }
    .filters {
      display: grid;
      grid-template-columns: repeat(4, minmax(94px, 1fr)) minmax(150px, 1.5fr);
      gap: 9px;
      margin-bottom: 10px;
    }
    .filters.four { grid-template-columns: repeat(3, minmax(110px, 1fr)) minmax(190px, 1.6fr); }
    select, .filter-input {
      height: 31px;
      border: 1px solid #cddcf4;
      border-radius: 7px;
      background: #fff;
      color: var(--blue-900);
      padding: 0 10px;
      font-size: 11.5px;
      font-weight: 700;
      min-width: 0;
    }
    .filter-label {
      display: grid;
      gap: 5px;
      color: var(--blue-900);
      font-size: 10.5px;
      font-weight: 850;
    }
    .filter-input { display: flex; align-items: center; gap: 8px; color: var(--muted); }
    .filter-input input {
      min-width: 0;
      width: 100%;
      border: 0;
      outline: 0;
      color: var(--blue-900);
      background: transparent;
      font-size: 11.5px;
      font-weight: 700;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      color: var(--blue-950);
      font-size: 11.2px;
    }
    th {
      height: 32px;
      position: sticky;
      top: 0;
      z-index: 2;
      background: #f4f8ff;
      color: var(--blue-950);
      text-align: left;
      font-size: 10.6px;
      font-weight: 900;
      padding: 0 9px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    td {
      height: 36px;
      border-bottom: 1px solid var(--line);
      padding: 0 9px;
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    tr.selected { background: #f0f6ff; }
    .row-actions {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    .row-actions .icon-btn {
      width: 26px;
      height: 26px;
    }
    .table-wrap {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .table-scroll {
      max-height: min(31vh, 315px);
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: #aecaef #f4f8ff;
    }
    .table-scroll::-webkit-scrollbar { width: 8px; }
    .table-scroll::-webkit-scrollbar-track { background: #f4f8ff; }
    .table-scroll::-webkit-scrollbar-thumb { background: #aecaef; border-radius: 999px; }
    .knowledge-grid .table-scroll { max-height: min(34vh, 330px); }
    .left-stack .table-scroll { max-height: min(30vh, 260px); }
    .knowledge-left > .panel:first-child,
    .left-stack > .panel:first-child {
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
    }
    .knowledge-left > .panel:first-child .table-wrap,
    .left-stack > .panel:first-child .table-wrap {
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
    }
    .knowledge-left > .panel:first-child .table-scroll,
    .left-stack > .panel:first-child .table-scroll {
      max-height: none;
      min-height: 0;
    }
    .table-foot {
      height: 34px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 11px;
      padding: 0 8px;
    }
    .pages { display: flex; gap: 7px; align-items: center; }
    .page {
      min-width: 28px;
      height: 28px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--blue-900);
      border-radius: 7px;
      font-weight: 800;
    }
    .page.active { color: #fff; background: var(--blue-900); }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 6px;
      padding: 4px 7px;
      font-size: 10.6px;
      font-weight: 850;
      background: var(--blue-100);
      color: var(--blue-900);
    }
    .pill.green { color: var(--green); background: #eaf9f0; }
    .pill.orange { color: var(--orange); background: #fff1dc; }
    .pill.red { color: var(--red); background: #ffe9e9; }
    .pill.purple { color: var(--purple); background: #f1e9ff; }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px 16px;
      font-size: 12px;
    }
    .detail-grid .wide { grid-column: 1 / -1; }
    .detail-label { color: var(--blue-900); font-size: 10.8px; font-weight: 900; }
    .detail-value { margin-top: 2px; color: var(--ink); line-height: 1.35; }
    .timeline-mini {
      margin-top: 13px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
      align-items: center;
      text-align: center;
      color: var(--muted);
      font-size: 9.5px;
    }
    .step {
      position: relative;
      display: grid;
      justify-items: center;
      gap: 5px;
    }
    .step:before {
      content: "";
      position: absolute;
      left: -50%;
      right: 50%;
      top: 10px;
      border-top: 2px solid #9dd9ba;
      z-index: 0;
    }
    .step:first-child:before { display: none; }
    .step span {
      width: 21px;
      height: 21px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #fff;
      border: 1px solid #bdd0ee;
      color: var(--blue-900);
      font-weight: 900;
      z-index: 1;
    }
    .step.done span { color: var(--green); border-color: var(--green); background: #f1fff7; }
    .step.active span { color: #fff; border-color: var(--blue-900); background: var(--blue-900); }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .quick-grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .quick-grid .btn {
      min-height: 58px;
      flex-direction: column;
      gap: 6px;
    }

    .ai-panel {
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      gap: 8px;
      min-height: 0;
    }
    .ai-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--blue-900);
      font-size: 15px;
      font-weight: 900;
    }
    .online { color: var(--green); font-size: 11.5px; font-weight: 800; }
    .chat {
      min-height: 0;
      display: grid;
      gap: 8px;
      align-content: start;
      overflow: hidden;
    }
    .bubble {
      border-radius: 8px;
      background: #edf4ff;
      color: var(--ink);
      padding: 9px 11px;
      font-size: 11.5px;
      line-height: 1.4;
    }
    .bubble.response { background: #fff; border: 1px solid var(--line); }
    .typing {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      width: fit-content;
    }
    .typing i {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--blue-700);
      animation: blink 900ms infinite ease-in-out;
    }
    .typing i:nth-child(2) { animation-delay: 120ms; }
    .typing i:nth-child(3) { animation-delay: 240ms; }
    @keyframes blink { 0%, 80%, 100% { opacity: .25; transform: translateY(0); } 40% { opacity: 1; transform: translateY(-2px); } }
    .ai-cols {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .ai-mini {
      background: #f7fbff;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 8px;
      font-size: 10.7px;
      line-height: 1.35;
    }
    .ai-mini strong { display: block; color: var(--blue-900); margin-bottom: 4px; }
    .ask {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 36px;
      gap: 8px;
      align-self: end;
    }
    .ask input {
      height: 32px;
      border: 1px solid #cddcf4;
      border-radius: 7px;
      padding: 0 10px;
      color: var(--ink);
      min-width: 0;
    }
    .ask .btn {
      height: 32px;
      min-height: 32px;
      padding: 0;
    }

    .theory-grid {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 14px;
    }
    .canvas {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-template-rows: repeat(3, minmax(106px, 1fr));
      gap: 12px;
      position: relative;
    }
    .theory-connectors {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: visible;
    }
    .theory-connectors path {
      fill: none;
      stroke: rgba(6, 66, 229, .52);
      stroke-width: .8;
      stroke-dasharray: 2.5 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }
    .theory-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 13px;
      min-width: 0;
      overflow: hidden;
      position: relative;
      z-index: 1;
      cursor: pointer;
      transition: transform var(--ease), box-shadow var(--ease), border-color var(--ease), background var(--ease);
    }
    .theory-card:after {
      content: "Ver detalle →";
      position: absolute;
      right: 11px;
      bottom: 8px;
      color: var(--blue-900);
      font-size: 10.5px;
      font-weight: 900;
      opacity: 0;
      transform: translateX(5px);
      transition: opacity var(--ease), transform var(--ease);
    }
    .theory-card:hover {
      transform: translateY(-3px);
      border-color: var(--blue-700);
      box-shadow: 0 14px 28px rgba(7, 53, 183, .13);
    }
    .theory-card:hover:after { opacity: 1; transform: translateX(0); }
    .theory-card.active {
      border-color: var(--gold);
      box-shadow: inset 3px 0 0 var(--gold), 0 16px 30px rgba(7, 53, 183, .14);
    }
    .theory-card.center {
      border-style: dashed;
      display: grid;
      place-items: center;
      text-align: center;
      background: #fff;
    }
    .theory-card.warn { background: #fff7ef; border-color: #ffd8ad; }
    .theory-card.next { background: #f1fff6; border-color: #bdebcf; }
    .card-title {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--blue-900);
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 9px;
    }
    .card-text {
      color: var(--ink);
      font-size: 11.7px;
      line-height: 1.48;
      margin: 0;
    }
    .bullet-list {
      margin: 0;
      padding-left: 17px;
      color: var(--ink);
      font-size: 11.7px;
      line-height: 1.55;
    }
    .tag-row {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 7px;
      align-items: center;
      font-size: 11px;
      margin-top: 7px;
    }
    .tag { border-radius: 6px; padding: 5px 7px; font-weight: 850; text-align: center; background: var(--blue-100); color: var(--blue-900); }
    .tag.green { background: #eaf9f0; color: var(--green); }
    .tag.purple { background: #efe8ff; color: var(--purple); }

    .knowledge-grid {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, .68fr);
      gap: 14px;
    }
    .knowledge-left {
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(330px, 1fr) minmax(104px, .25fr);
      gap: 12px;
    }
    .knowledge-right {
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(210px, .88fr) minmax(180px, .82fr);
      gap: 12px;
    }
    .saved-list .list-row { grid-template-columns: 28px minmax(0, 1fr) auto; min-height: 35px; }

    .canvas-layout {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 12px;
    }
    .canvas-shell {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
    }
    .canvas-toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
      margin-bottom: 10px;
    }
    .case-tabs {
      display: flex;
      gap: 8px;
      align-items: center;
      min-width: 0;
      flex-wrap: wrap;
    }
    .case-chip {
      min-height: 30px;
      border: 1px solid #cddcf4;
      border-radius: 7px;
      background: #f5f9ff;
      color: var(--blue-900);
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 850;
    }
    .zoom-controls { display: flex; gap: 7px; align-items: center; }
    .zoom-value { min-width: 58px; text-align: center; color: var(--blue-900); font-weight: 900; font-size: 12px; }
    .canvas-board {
      min-height: 0;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        radial-gradient(circle, rgba(6, 66, 229, .12) 1px, transparent 1px) 0 0 / 18px 18px,
        linear-gradient(180deg, #fff, #fbfdff);
    }
    .canvas-content {
      position: absolute;
      inset: 0;
      width: 980px;
      height: 620px;
      transform-origin: 0 0;
    }
    .canvas-links {
      position: absolute;
      inset: 0;
      width: 980px;
      height: 620px;
      pointer-events: none;
      z-index: 1;
    }
    .canvas-links path {
      fill: none;
      stroke: rgba(6, 66, 229, .72);
      stroke-width: 1.4;
      marker-end: url(#canvasArrow);
    }
    .canvas-links path.indirect {
      stroke: rgba(111, 50, 214, .72);
      stroke-dasharray: 4 4;
    }
    .canvas-link-label {
      fill: var(--blue-900);
      font-size: 10px;
      font-weight: 800;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 4px;
      stroke-linejoin: round;
    }
    .canvas-node {
      position: absolute;
      z-index: 2;
      width: 170px;
      min-height: 72px;
      border: 1px solid #b8cdf1;
      border-radius: 8px;
      background: #fff;
      padding: 12px;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      box-shadow: 0 10px 22px rgba(7, 53, 183, .08);
      color: var(--blue-950);
      cursor: grab;
      user-select: none;
      transition: border-color var(--ease), box-shadow var(--ease), transform var(--ease), background var(--ease);
    }
    .canvas-node:hover {
      transform: translateY(-2px);
      border-color: var(--blue-700);
      box-shadow: 0 14px 28px rgba(7, 53, 183, .14);
    }
    .canvas-node:active { cursor: grabbing; }
    .canvas-node.selected {
      border-color: var(--gold);
      box-shadow: inset 3px 0 0 var(--gold), 0 18px 32px rgba(7, 53, 183, .16);
    }
    .node-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--blue-100);
      color: var(--blue-900);
    }
    .canvas-node.persona { background: #f3fff8; border-color: #9dd9b7; }
    .canvas-node.vehiculo { background: #f5fff8; border-color: #bdebcf; }
    .canvas-node.evidencia { background: #fbf7ff; border-color: #d5c1f8; }
    .canvas-node.hecho { background: #fff9eb; border-color: #ffe0a6; }
    .canvas-node.normativa,
    .canvas-node.jurisprudencia { background: #f3fdff; border-color: #afe2eb; }
    .node-title { font-weight: 900; font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .node-sub { color: var(--muted); font-size: 11px; font-weight: 750; margin-top: 3px; }
    .canvas-detail {
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(215px, .75fr) minmax(178px, .55fr) auto;
      gap: 10px;
    }
    .canvas-detail-card { border: 1px solid var(--line); border-radius: var(--radius); padding: 12px; background: #fff; }
    .canvas-detail .ai-cols { display: none; }
    .canvas-detail .chat { gap: 6px; max-height: 68px; overflow: hidden; }
    .canvas-detail-card .bullet-list { max-height: 58px; overflow: hidden; }
    .canvas-legend {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 12px;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(8px);
      padding: 8px 12px;
      color: var(--blue-950);
      font-size: 11px;
      font-weight: 800;
    }
    .legend-dot { width: 16px; height: 16px; border-radius: 4px; display: inline-block; margin-right: 5px; vertical-align: middle; background: var(--blue-100); }
    .legend-dot.persona { background: #bfead0; }
    .legend-dot.vehiculo { background: #d6f2df; }
    .legend-dot.evidencia { background: #d9c5fb; }
    .legend-dot.hecho { background: #ffe2a4; }
    .legend-dot.legal { background: #aee8ef; }
    .sortable th { cursor: pointer; }
    .sortable th:hover { color: var(--blue-700); }
    .quick-prompts {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin: 6px 0;
    }
    .prompt-chip {
      border: 1px solid #cddcf4;
      border-radius: 999px;
      background: #fff;
      color: var(--blue-900);
      padding: 4px 7px;
      font-size: 10px;
      font-weight: 850;
    }
    .ai-panel.is-floating {
      position: relative;
      transform: translate(var(--ia-x, 0px), var(--ia-y, 0px));
      z-index: 8;
    }
    .ai-panel .ai-title { cursor: grab; }
    .ai-panel.dragging .ai-title { cursor: grabbing; }
    .ai-panel.minimized {
      grid-template-rows: auto;
      align-self: start;
    }
    .ai-panel.minimized .chat,
    .ai-panel.minimized .ask,
    .ai-panel.minimized .quick-prompts { display: none; }

    .footer {
      min-width: 0;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      padding: 0 24px;
      color: var(--muted);
      border-top: 1px solid var(--line);
      background: #edf5ff;
      font-size: 11px;
    }
    .footer .links { justify-self: end; display: flex; gap: 18px; white-space: nowrap; }
    .mobile-notice { display: none; color: var(--orange); font-weight: 800; }
    .legal-mobile { display: none; }

    .toast-wrap {
      position: fixed;
      right: 18px;
      bottom: 52px;
      z-index: 50;
      display: grid;
      gap: 8px;
    }
    .toast {
      max-width: 340px;
      padding: 10px 12px;
      border-radius: var(--radius);
      color: #fff;
      background: var(--blue-950);
      box-shadow: 0 14px 30px rgba(5,31,99,.25);
      font-size: 12px;
      font-weight: 750;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(8, 28, 73, .28);
      backdrop-filter: blur(5px);
      z-index: 40;
    }
    .modal-backdrop.open { display: flex; }
    .modal-backdrop.drawer-open { justify-content: flex-end; padding: 0; }
    .modal {
      width: min(690px, 94vw);
      max-height: min(610px, 90vh);
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 24px 80px rgba(5, 31, 99, .28);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
    }
    .detail-drawer {
      width: min(420px, 92vw);
      height: 100%;
      margin-left: auto;
      background: #fff;
      border-left: 1px solid var(--line);
      box-shadow: -18px 0 50px rgba(5,31,99,.16);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }
    .drawer-body { padding: 16px; overflow: hidden; }
    .drawer-meta { display: grid; gap: 10px; margin-top: 14px; }
    .modal-head, .modal-foot {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
    }
    .modal-foot { border-top: 1px solid var(--line); border-bottom: 0; }
    .modal-title { display: flex; align-items: center; gap: 10px; }
    .modal-title strong { display: block; color: var(--blue-900); font-size: 17px; }
    .modal-title span { color: var(--muted); font-size: 12px; }
    .modal-body {
      min-height: 0;
      overflow: hidden;
      display: grid;
      gap: 8px;
      padding: 10px 14px;
    }
    .evidence-row {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      min-height: 86px;
      display: grid;
      grid-template-columns: 86px minmax(0, 1fr) minmax(180px, .72fr) auto;
      gap: 12px;
      align-items: center;
    }
    .thumb {
      height: 64px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, #586c88, #182946);
      font-size: 24px;
      font-weight: 900;
      position: relative;
      overflow: hidden;
    }
    .thumb.phone, .thumb.doc, .thumb.person { background: #eef4ff; color: var(--blue-900); }
    .thumb small {
      position: absolute;
      right: 5px;
      bottom: 4px;
      font-size: 10px;
      color: #fff;
      background: rgba(0,0,0,.45);
      border-radius: 4px;
      padding: 1px 4px;
    }
    .ev-title { color: var(--blue-950); font-size: 12.5px; font-weight: 900; margin-bottom: 6px; }
    .ev-meta { display: grid; gap: 4px; color: var(--muted); font-size: 10.8px; line-height: 1.25; }
    .ev-meta b { color: var(--blue-900); }

    @media (max-height: 800px) {
      :root { --topbar: 48px; --footer: 34px; }
      .content { padding: 10px 18px 9px; gap: 9px; }
      .sidebar { padding-top: 16px; gap: 12px; }
      .mark { width: 50px; height: 56px; margin-bottom: 8px; }
      .brand-title { font-size: 13px; }
      .nav button { min-height: 32px; padding: 7px 10px; font-size: 11.5px; }
      h1 { font-size: 25px; }
      .subtitle { font-size: 12px; margin-top: 4px; }
      .summary-strip { min-height: 72px; }
      .summary-cell { padding: 10px 16px; grid-template-columns: 40px 1fr; }
      .orb { width: 40px; height: 40px; }
      .kpi { min-height: 66px; padding: 10px 15px; grid-template-columns: 40px 1fr; }
      .kpi .value { font-size: 21px; }
      .hero-actions { gap: 12px; }
      .home-card { padding: 15px 18px; gap: 10px; }
      .home-card .orb { width: 62px; height: 62px; }
      .home-card h2 { font-size: 18px; }
      .home-card p { font-size: 12.5px; }
      .home-grid { grid-template-rows: minmax(175px, .9fr) minmax(174px, .86fr); }
      .home-bottom { gap: 10px; }
      .pad { padding: 11px; }
      .left-stack { grid-template-rows: minmax(250px, 1fr) minmax(122px, .45fr); }
      .right-stack { grid-template-rows: minmax(198px, .88fr) minmax(170px, .82fr); }
      .filters { gap: 7px; margin-bottom: 8px; }
      td { height: 32px; font-size: 10.5px; padding: 0 7px; }
      th { height: 29px; padding: 0 7px; }
      .table-foot { height: 30px; }
      .canvas { grid-template-rows: repeat(3, minmax(92px, 1fr)); gap: 10px; }
      .theory-card { padding: 10px; }
      .card-title { font-size: 12.8px; margin-bottom: 6px; }
      .card-text, .bullet-list { font-size: 10.8px; line-height: 1.42; }
      .ai-cols { gap: 6px; }
      .bubble, .ai-mini { font-size: 10.5px; }
      .quick-grid .btn { min-height: 48px; }
      .case-mini { padding: 11px; }
    }

    @media (max-width: 980px) {
      :root { --sidebar: 62px; }
      .brand-title, .brand-acronym, .nav span, .case-mini, .collapse span { display: none; }
      .sidebar { padding-left: 9px; padding-right: 9px; align-items: center; }
      .mark { width: 42px; height: 48px; }
      .nav button { justify-content: center; padding: 8px; }
      .topbar { grid-template-columns: minmax(0, 1fr) auto; padding: 8px 12px; }
      .search { display: none; }
      .main-two, .theory-grid, .knowledge-grid { grid-template-columns: 1fr; }
      .canvas-layout { grid-template-columns: 1fr; }
      .right-stack, .knowledge-right, .theory-grid > .ai-panel { display: none; }
      .home-bottom { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 720px) {
      #app,
      #app.sidebar-collapsed {
        width: 100vw;
        max-width: 100vw;
        overflow: hidden;
        grid-template-columns: 48px minmax(0, calc(100vw - 48px));
      }
      .sidebar { width: 48px; padding-left: 6px; padding-right: 6px; }
      #app.sidebar-collapsed .sidebar { padding-left: 6px; padding-right: 6px; }
      .mark { width: 36px; height: 42px; }
      #app.sidebar-collapsed .mark { width: 36px; height: 42px; }
      .nav button { min-height: 34px; }
      .main {
        width: calc(100vw - 48px);
        max-width: calc(100vw - 48px);
        min-width: 0;
        overflow: hidden;
      }
      .topbar {
        width: 100%;
        max-width: 100%;
        min-width: 0;
        grid-template-columns: minmax(0, 1fr) auto;
        padding: 7px 8px;
      }
      .top-actions { max-width: 54px; overflow: hidden; gap: 4px; }
      .top-actions .icon-btn:nth-child(n+2), .user { display: none; }
      .content {
        width: 100%;
        max-width: 100%;
        padding: 9px;
        overflow-y: auto;
        overflow-x: hidden;
        display: block;
      }
      .head { margin-bottom: 10px; }
      h1, .subtitle {
        max-width: calc(100vw - 74px);
        overflow-wrap: anywhere;
        word-break: normal;
      }
      .subtitle { font-size: 12px; line-height: 1.3; }
      .screen, .home-grid, .hero-actions, .home-bottom, .bottom-split, .panel, .home-card {
        width: 100%;
        max-width: 100%;
        min-width: 0;
      }
      .screen { overflow: visible; display: block; }
      .screen > * { margin-bottom: 10px; }
      .head { grid-template-columns: 1fr; }
      .actions {
        display: grid;
        grid-template-columns: 1fr;
        justify-content: stretch;
        overflow: visible;
      }
      .actions .btn { width: 100%; min-width: 0; }
      .hero-actions, .kpis, .summary-strip, .summary-strip.four, .home-bottom, .bottom-split {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .home-grid { grid-template-rows: auto auto; }
      .home-card { min-height: 150px; padding: 16px 12px; }
      .home-card .orb { width: 54px; height: 54px; }
      .home-card p { display: none; }
      .home-card .btn { width: 100%; }
      .btn { white-space: normal; }
      .filters, .filters.four { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .table-wrap { font-size: 10px; }
      table th:nth-child(n+5), table td:nth-child(n+5) { display: none; }
      .canvas { grid-template-columns: 1fr; grid-template-rows: none; }
      .theory-connectors { display: none; }
      .canvas-toolbar { grid-template-columns: 1fr; }
      .zoom-controls { justify-content: start; flex-wrap: wrap; }
      .canvas-board { min-height: 520px; overflow: auto; }
      .canvas-content { transform: none !important; }
      .canvas-node { cursor: pointer; }
      .canvas-detail { display: none; }
      .ai-panel.is-floating { transform: none !important; }
      .summary-cell { padding: 9px; grid-template-columns: 34px 1fr; }
      .orb { width: 34px; height: 34px; }
      .mobile-notice { display: block; }
      .legal-mobile { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .footer { grid-template-columns: 1fr; padding: 0 10px; }
      .footer .links, .footer > div:nth-child(2) { display: none; }
      .evidence-row { grid-template-columns: 56px minmax(0,1fr); }

    function canvasSvg() {
      const links = DEMO_DATA.canvas.links.map((l, i) => {
        const a = canvasPos(canvasNodeById(l[0]));

        const x1 = a.x + 170, y1 = a.y + 36, x2 = b.x, y2 = b.y + 36;
        const mx = (x1 + x2) / 2, my = (y1 + y2) / 2 - 8;
        const curve = Math.max(30, Math.abs(x2 - x1) * .32);
        const indirect = i % 4 === 0 ? " indirect" : "";
        return `<path class="${indirect}" d="M${x1} ${y1} C${x1 + curve} ${y1}, ${x2 - curve} ${y2}, ${x2} ${y2}"/><text class="canvas-link-label" x="${mx}" y="${my}" text-anchor="middle">${l[2]}</text>`;
      }).join("");
      return `<svg class="canvas-links" viewBox="0 0 980 620" aria-hidden="true"><defs><marker id="canvasArrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#0642e5"/></marker></defs>${links}</svg>`;

    function filters(names, placeholder, compact = false, id = "") {
      const opts = ["Todas", "Alta", "Media", "2022", "2021", "Derecho Penal", "Sala Penal Permanente", "Doctor"];
      const s = tableState(id);
      return `<div class="filters ${compact ? "four" : ""}" data-table-filters="${id}">${names.map((n, idx) => `<label class="filter-label">${n}<select data-table-filter="${id}">${opts.map(o => `<option ${s.filters?.[idx] === o ? "selected" : ""}>${o}</option>`).join("")}</select></label>`).join("")}<label class="filter-label">Palabras clave<div class="filter-input">${icon("search")}<input data-table-search="${id}" value="${escapeHtml(s.q || "")}" placeholder="${placeholder}"></div></label></div>`;
    }

    function dynamicTable(id, rows, columns, last) {
      const processed = tableRows(id, rows);
      const limit = 3;
      const page = Math.min(tableState(id).page || 1, Math.max(1, Math.ceil(processed.length / limit)));
      const shown = processed.slice((page - 1) * limit, page * limit);
      return `<div class="table-wrap" data-table="${id}"><div class="table-scroll"><table class="sortable"><thead><tr>${columns.map((c, i) => `<th ${i < columns.length - 1 ? `data-sort-table="${id}" data-sort-col="${i}"` : ""}>${c}</th>`).join("")}</tr></thead><tbody>${shown.map((r, i) => `<tr class="${i === 0 && page === 1 ? "selected" : ""}">${r.map((x, idx) => `<td>${idx === r.length - 1 || idx === 3 && id === "normativa" || idx === 5 && id === "historial" || idx === 4 && id === "jurisprudencia" ? priority(x) : idx === 0 ? `<b>${x}</b>` : x}</td>`).join("")}<td>${rowActions()}</td></tr>`).join("")}</tbody></table></div><div class="table-foot"><span>Mostrando ${shown.length} de ${processed.length || rows.length} resultados</span>${tablePages(id, page, Math.max(1, Math.ceil(processed.length / limit)), last)}</div></div>`;
    }

    function tableState(id) {
      if (!state.table[id]) state.table[id] = { q: "", filters: [], sort: 0, dir: 1, page: 1 };
      return state.table[id];
    }

    function tableRows(id, rows) {
      const s = tableState(id);
      const activeFilters = (s.filters || []).filter(v => v && v !== "Todas");
      let out = rows.filter(r => {
        const text = r.join(" ").toLowerCase();
        return (!s.q || text.includes(s.q.toLowerCase())) && activeFilters.every(f => text.includes(f.toLowerCase()));
      });
      if (Number.isInteger(s.sort)) {
        out = [...out].sort((a, b) => String(a[s.sort] || "").localeCompare(String(b[s.sort] || ""), "es") * (s.dir || 1));
      }
      return out;
    }

    }

    function historyDetail() {
      return `<div class="panel pad"><div class="section-head"><h2 class="section-title">Detalle del registro seleccionado</h2><span class="pill red">Alta</span></div><h2 class="section-title">${DEMO_DATA.historial[0][1]}</h2><div class="detail-grid">${[["Fecha","10/04/2024 10:45 a. m."],["Usuario","Doctor"],["Módulo","Gestión de casos"],["Caso",DEMO_DATA.case.id],["Documento relacionado","Disposición fiscal de formalización"],["Estado","Registrado"]].map(r => `<div><div class="detail-label">${r[0]}</div><div class="detail-value">${r[1]}</div></div>`).join("")}<div class="wide"><div class="detail-label">Impacto en el caso</div><div class="detail-value">Impulsa el avance a formalización, vincula medios probatorios y refuerza la teoría fiscal.</div></div></div><button class="btn ghost" data-toast="Registro simulado." style="margin-top:12px">Ver registro ${icon("external")}</button></div>`;
    }

    function aiPanel(key, tall = false) {
      const prompts = ["Fortalece teoría", "Revisa evidencia", "Sugiere norma"];
      const style = `--ia-x:${state.ia.x || 0}px;--ia-y:${state.ia.y || 0}px`;
      return `<div class="panel pad ai-panel is-floating ${state.ia.minimized ? "minimized" : ""}" data-ai-panel style="${style}">
        <div class="ai-title" data-ai-handle><span>${icon("target")} Asistencia IA-Legal</span><span class="online"><span class="status-dot green"></span>En línea</span><button class="icon-btn" data-ai-minimize aria-label="${state.ia.minimized ? "Restaurar IA-Legal" : "Minimizar IA-Legal"}">${state.ia.minimized ? "›" : "−"}</button></div>
        <div class="quick-prompts">${prompts.map(p => `<button class="prompt-chip" data-ai-prompt="${p}">${p}</button>`).join("")}</div>
        <div class="chat"><div class="tiny">Consulta sobre este caso</div><div class="bubble">¿Qué ${key === "teoria" ? "normativa es aplicable al caso" : key === "canvas" ? "relaciones conviene contrastar" : "análisis fortalece este caso"}?</div><div class="bubble response">${DEMO_DATA.ai[key] || DEMO_DATA.ai.teoria}</div><div class="ai-cols"><div class="ai-mini"><strong>Normativa aplicable</strong>CP: arts. 188 y 189<br>CPP: arts. 159 y 160</div><div class="ai-mini"><strong>Teorías sugeridas</strong>Autoría directa<br>Apoderamiento</div><div class="ai-mini"><strong>Líneas de sustento</strong>Video, testimonio e incautación</div></div>${tall ? `<button class="btn ghost" data-toast="Análisis completo simulado." style="justify-self:center">Ver análisis completo ${icon("external")}</button>` : ""}</div>
        <div class="ask"><input placeholder="Escribe tu consulta..."><button class="btn primary" data-ai-send>${icon("send")}</button></div>
      </div>`;
    }

    function recentPanel(title) {
      return `<div class="panel pad"><div class="section-head"><h2 class="section-title">${title}</h2><button class="btn small" data-toast="Listado simulado.">Ver todas</button></div><div class="list">${DEMO_DATA.historial.slice(0,4).map(r => `<div class="list-row" style="grid-template-columns:minmax(120px,.6fr) minmax(0,1fr) minmax(80px,.45fr)"><div class="tiny">${r[0]}</div><strong>${r[1]}</strong><div class="tiny">${r[3]}</div></div>`).join("")}</div></div>`;
    }

    function savedPanel(title) {
      return `<div class="panel pad saved-list"><div class="section-head"><h2 class="section-title">${title}</h2></div><div class="list">${["Código Penal – arts. 188 y 189","Código Procesal Penal – arts. 159, 160, 313 y 314","Constitución Política – tutela jurisdiccional"].map((x, i) => `<div class="list-row">${icon("book")}<strong>${x}</strong><span class="tiny">${i ? "Ayer" : "Hoy"}</span></div>`).join("")}</div><button class="btn ghost" data-toast="Guardados simulados." style="width:100%;margin-top:8px">Ver todas las guardadas (18) ${icon("external")}</button></div>`;
    }

    function quickPanel(items, variant = "") {
      return `<div class="panel pad"><h2 class="section-title">Acciones rápidas</h2><div class="quick-grid ${variant}">${items.map(([t, ic]) => `<button class="btn ghost" data-toast="${t} simulado.">${icon(ic)}<span>${t}</span></button>`).join("")}</div></div>`;
    }

    function priority(v) {
      const tone = v === "Urgente" || v === "Alta" ? "red" : v === "Media" ? "orange" : v === "Baja" ? "" : "red";
      return `<span class="pill ${tone}">${v}</span>`;
    }
    function status(v) {
      const tone = v === "En trámite" ? "green" : v === "En análisis" ? "" : "orange";
      return `<span class="pill ${tone}">${v}</span>`;
    }
    function rowActions() {
      return `<span class="row-actions"><button class="icon-btn" data-toast="Ver simulado." aria-label="Ver">${icon("eye")}</button><button class="icon-btn" data-toast="Editar simulado." aria-label="Editar">${icon("edit")}</button><button class="icon-btn" data-toast="Abrir simulado." aria-label="Abrir">${icon("external")}</button></span>`;
    }
    function pages(last) {
      return `<div class="pages"><button class="page">‹</button><button class="page active">1</button><button class="page">2</button><button class="page">3</button><span>...</span><button class="page">${last}</button><button class="page">›</button></div>`;
    }

    function evidenceModal() {
      return `<div class="modal" role="dialog" aria-modal="true" aria-label="Evidencias del caso">
        <div class="modal-head"><div class="modal-title"><div class="orb">${icon("folder")}</div><div><strong>Evidencias del caso</strong><span>Caso: ${DEMO_DATA.case.id}</span></div></div><div class="actions"><button class="btn ghost" data-toast="Agregar evidencia simulado.">${icon("plus")} Agregar evidencia</button><button class="icon-btn" data-close-modal aria-label="Cerrar">${icon("close")}</button></div></div>
        <div class="modal-body">${DEMO_DATA.evidence.map((e, i) => `<div class="evidence-row"><div class="thumb ${i === 1 ? "phone" : i === 2 ? "doc" : i === 3 ? "person" : ""}">${i === 0 ? "▶<small>02:14</small>" : icon(i === 1 ? "phone" : i === 3 ? "user" : "doc")}</div><div><div class="ev-title">${i+1}. ${e[0]}</div><div class="ev-meta"><span><b>Archivo:</b> ${e[1]}</span><span><b>Duración:</b> ${e[2]}</span><span><b>Captura:</b> ${e[3]}</span></div></div><div class="ev-meta"><span><b>Fuente:</b> ${e[4]}</span><span><b>Fecha:</b> ${e[5]}</span><span><b>Responsable:</b> ${e[6]}</span></div><div style="display:grid;gap:8px"><button class="btn ghost small" data-toast="${e[7]} simulado.">${e[7]}</button><button class="btn ghost small" data-toast="Descargar simulado.">Descargar</button></div></div>`).join("")}</div>
        <div class="modal-foot"><span class="tiny">4 evidencias</span><button class="btn primary" data-screen="teoria" data-close-modal>Ir a página de evidencias ${icon("external")}</button></div>
      </div>`;
    }

    function detailDrawer() {
      return `<aside class="detail-drawer" role="dialog" aria-modal="true" aria-label="Detalle del caso">
        <div class="modal-head"><div class="modal-title"><div class="orb">${icon("folder")}</div><div><strong>Detalle del caso</strong><span>${DEMO_DATA.case.id}</span></div></div><button class="icon-btn" data-close-modal aria-label="Cerrar detalle">${icon("close")}</button></div>
        <div class="drawer-body">
          <h2 class="section-title">${DEMO_DATA.case.crime}</h2>
          <div class="tiny">Resumen simulado del expediente fiscal activo.</div>
          <div class="drawer-meta">
            ${[["Responsable", DEMO_DATA.case.owner], ["Etapa", DEMO_DATA.case.stage], ["Última actualización", state.lastUpdated], ["Actuaciones simuladas", String(state.actionCount)], ["Evidencias", "4 evidencias clave vinculadas"], ["Próxima acción", "Solicitar formalización de la investigación"]].map(r => `<div><div class="detail-label">${r[0]}</div><div class="detail-value">${r[1]}</div></div>`).join("")}
          </div>
          <button class="btn primary" data-copy-case style="margin-top:18px;width:100%">Copiar ID de caso</button>
        </div>
      </aside>`;
    }

    function bind() {
      document.querySelectorAll("[data-screen]").forEach(el => el.addEventListener("click", () => {
        const target = el.dataset.screen;
        if (target) state.screen = target;
        state.modal = false;
        state.drawer = false;
        app();
      }));
      document.querySelectorAll("[data-toast]").forEach(el => el.addEventListener("click", ev => {
        ev.stopPropagation();
        simulateAction(el.dataset.toast);
      }));
      document.querySelectorAll("[data-toggle-sidebar]").forEach(el => el.addEventListener("click", () => {
        state.sidebarCollapsed = !state.sidebarCollapsed;
        localStorage.setItem("fcis.sidebarCollapsed", String(state.sidebarCollapsed));
        app();
      }));
      document.querySelectorAll("[data-open-detail]").forEach(el => el.addEventListener("click", () => {
        state.drawer = true;
        state.modal = false;
        app();
      }));
      document.querySelectorAll("[data-open-evidence]").forEach(el => el.addEventListener("click", () => {
        state.modal = true;
        state.drawer = false;
        app();
      }));
      document.querySelectorAll("[data-close-modal]").forEach(el => el.addEventListener("click", () => {
        state.modal = false;
        state.drawer = false;
        app();
      }));
      document.getElementById("modal").addEventListener("click", ev => {
        if (ev.target.id === "modal") {
          state.modal = false;
          state.drawer = false;
          app();
        }
      });
      document.querySelectorAll(".search input").forEach(input => {
        input.addEventListener("input", () => {
          state.searchQuery = input.value;
          applySearchFilter(state.searchQuery);
        });
        input.addEventListener("keydown", ev => {
          if (ev.key === "Enter") simulateAction("Búsqueda simulada para demo.");
        });
      });
      document.querySelectorAll(".ask input").forEach(input => input.addEventListener("keydown", ev => {
        if (ev.key === "Enter") simulateAi(input.closest(".ai-panel"));
      }));
      document.querySelectorAll("[data-ai-send]").forEach(el => el.addEventListener("click", () => simulateAi(el.closest(".ai-panel"))));
      document.querySelectorAll("[data-ai-minimize]").forEach(el => el.addEventListener("click", ev => {
        ev.stopPropagation();
        state.ia.minimized = !state.ia.minimized;
        localStorage.setItem("fcis.iaPanel", JSON.stringify(state.ia));
        app();
      }));
      document.querySelectorAll("[data-ai-prompt]").forEach(el => el.addEventListener("click", () => {
        const panel = el.closest(".ai-panel");
        const input = panel?.querySelector(".ask input");
        if (input) input.value = el.dataset.aiPrompt;
        simulateAi(panel);
      }));
      initAiDrag();
      initCanvasDrag();
      document.querySelectorAll("[data-canvas-action]").forEach(el => el.addEventListener("click", () => simulateAction(`${el.dataset.canvasAction} simulado en canvas.`)));
      document.querySelectorAll("[data-zoom]").forEach(el => el.addEventListener("click", () => {
        const z = el.dataset.zoom;
        state.canvasZoom = z === "fit" ? 1 : Math.min(1.35, Math.max(.75, state.canvasZoom + (z === "+" ? .1 : -.1)));
        localStorage.setItem("fcis.canvasZoom", String(state.canvasZoom));
        app();
      }));
      bindDynamicTables();
      document.querySelectorAll("[data-theory-index]").forEach(el => {
        el.addEventListener("click", ev => {
          if (ev.target.closest("[data-open-evidence]")) return;
          state.selectedTheory = Number(el.dataset.theoryIndex);
          state.demoIndex = state.selectedTheory;
          simulateAction(`Detalle actualizado: ${DEMO_DATA.theoryCards[state.selectedTheory][0]}`);
          app();
        });
        el.addEventListener("keydown", ev => {
          if (ev.key === "Enter" || ev.key === " ") {
            ev.preventDefault();
            el.click();
          }
        });
        el.addEventListener("dragstart", ev => {
          if (matchMedia("(max-width: 720px)").matches) return ev.preventDefault();
          ev.dataTransfer.setData("text/plain", el.dataset.theoryIndex);
        });
        el.addEventListener("dragover", ev => ev.preventDefault());
        el.addEventListener("drop", ev => {
          ev.preventDefault();
          const from = Number(ev.dataTransfer.getData("text/plain"));
          const to = Number(el.dataset.theoryIndex);
          reorderTheory(from, to);
        });
      });
      document.querySelectorAll("[data-tour]").forEach(el => el.addEventListener("click", () => {
        state.demoMode = !state.demoMode;
        if (state.demoMode) {
          state.screen = "teoria";
          state.demoIndex = 0;
          state.selectedTheory = 0;
          simulateAction("Recorrido demo iniciado. Usa las flechas para avanzar.");
        } else {
          simulateAction("Recorrido demo pausado.");
        }
        app();
      }));
      document.querySelectorAll("[data-export-summary]").forEach(el => el.addEventListener("click", exportSummary));
      document.querySelectorAll("[data-copy-case]").forEach(el => el.addEventListener("click", copyCaseId));
      document.onkeydown = ev => {
        const activeTag = document.activeElement && document.activeElement.tagName;
        if ((ev.ctrlKey || ev.metaKey) && ev.key.toLowerCase() === "k") {
          ev.preventDefault();
          document.querySelector(".search input")?.focus();
        }
        if (ev.key === "Escape" && (state.modal || state.drawer || !state.ia.minimized)) {
          if (state.modal || state.drawer) {
            state.modal = false;
            state.drawer = false;
          } else {
            state.ia.minimized = true;
            localStorage.setItem("fcis.iaPanel", JSON.stringify(state.ia));
          }
          app();
        }
        if (state.demoMode && state.screen === "teoria" && !["INPUT", "TEXTAREA", "SELECT"].includes(activeTag)) {
          if (ev.key === "ArrowRight") {
            ev.preventDefault();
            state.demoIndex = (state.demoIndex + 1) % DEMO_DATA.theoryCards.length;
            state.selectedTheory = state.demoIndex;
            app();
          }
          if (ev.key === "ArrowLeft") {
            ev.preventDefault();
            state.demoIndex = (state.demoIndex - 1 + DEMO_DATA.theoryCards.length) % DEMO_DATA.theoryCards.length;
            state.selectedTheory = state.demoIndex;
            app();
          }
        }
      };
    }

    function initCanvasDrag() {
      if (matchMedia("(max-width: 720px)").matches) return;
      document.querySelectorAll("[data-canvas-node]").forEach(node => {
        node.addEventListener("pointerdown", ev => {
          if (ev.button !== 0) return;
          const id = node.dataset.canvasNode;
          const base = canvasPos(canvasNodeById(id));
          const start = { x: ev.clientX, y: ev.clientY, bx: base.x, by: base.y, moved: false };
          node.setPointerCapture(ev.pointerId);
          const move = e => {
            const dx = (e.clientX - start.x) / canvasScale();
            const dy = (e.clientY - start.y) / canvasScale();
            if (Math.abs(dx) + Math.abs(dy) > 2) start.moved = true;
            const x = Math.max(0, Math.min(810, start.bx + dx));
            const y = Math.max(0, Math.min(545, start.by + dy));
            state.canvasPositions[id] = { x, y };
            node.style.left = `${x}px`;
            node.style.top = `${y}px`;
            updateCanvasSvg();
          };
          const up = () => {
            node.removeEventListener("pointermove", move);
            node.removeEventListener("pointerup", up);
            localStorage.setItem("fcis.canvasPositions", JSON.stringify(state.canvasPositions));
            if (!start.moved) {
              state.selectedCanvasNode = id;
              localStorage.setItem("fcis.selectedCanvasNode", id);
              app();
            }
          };
          node.addEventListener("pointermove", move);
          node.addEventListener("pointerup", up);
        });
      });
    }

    function updateCanvasSvg() {
      const svg = document.querySelector(".canvas-links");
      if (svg) svg.outerHTML = canvasSvg();
    }

    function initAiDrag() {
      if (matchMedia("(max-width: 720px)").matches) return;
      document.querySelectorAll("[data-ai-handle]").forEach(handle => {
        handle.addEventListener("pointerdown", ev => {
          if (ev.target.closest("button")) return;
          const panel = handle.closest(".ai-panel");
          const start = { x: ev.clientX, y: ev.clientY, bx: state.ia.x || 0, by: state.ia.y || 0 };
          panel.classList.add("dragging");
          handle.setPointerCapture(ev.pointerId);
          const move = e => {
            state.ia.x = Math.max(-260, Math.min(260, start.bx + e.clientX - start.x));
            state.ia.y = Math.max(-260, Math.min(260, start.by + e.clientY - start.y));
            panel.style.setProperty("--ia-x", `${state.ia.x}px`);
            panel.style.setProperty("--ia-y", `${state.ia.y}px`);
          };
          const up = () => {
            panel.classList.remove("dragging");
            handle.removeEventListener("pointermove", move);
            handle.removeEventListener("pointerup", up);
            localStorage.setItem("fcis.iaPanel", JSON.stringify(state.ia));
          };
          handle.addEventListener("pointermove", move);
          handle.addEventListener("pointerup", up);
        });
      });
    }

    function bindDynamicTables() {
      document.querySelectorAll("[data-table-search]").forEach(input => input.addEventListener("input", () => {
        const id = input.dataset.tableSearch;
        tableState(id).q = input.value;
        tableState(id).page = 1;
        saveTableState();
        app();
      }));
      document.querySelectorAll("[data-table-filters]").forEach(group => group.querySelectorAll("select").forEach((select, idx) => {
        select.addEventListener("change", () => {
          const id = select.dataset.tableFilter;
          const s = tableState(id);
          s.filters = [...group.querySelectorAll("select")].map(x => x.value);
          s.page = 1;
          saveTableState();
          app();
        });
      }));
      document.querySelectorAll("[data-sort-table]").forEach(th => th.addEventListener("click", () => {
        const s = tableState(th.dataset.sortTable);
        const col = Number(th.dataset.sortCol);
        s.dir = s.sort === col ? -(s.dir || 1) : 1;
        s.sort = col;
        saveTableState();
        app();
      }));
      document.querySelectorAll("[data-table-page]").forEach(btn => btn.addEventListener("click", () => {
        tableState(btn.dataset.tablePage).page = Number(btn.dataset.page);
        saveTableState();
        app();
      }));
    }

    function saveTableState() {
      localStorage.setItem("fcis.tableState", JSON.stringify(state.table));
    }

    function reorderTheory(from, to) {
      const order = theoryDisplayOrder();
      const a = order.indexOf(from);
      const b = order.indexOf(to);
      if (a < 0 || b < 0 || a === b) return;
      order.splice(b, 0, order.splice(a, 1)[0]);
      state.theoryOrder = order;
      state.selectedTheory = from;
      localStorage.setItem("fcis.theoryOrder", JSON.stringify(order));
      simulateAction("Tarjeta reordenada en Teoría del Caso.");
      app();
    }

    function toast(message) {
      const wrap = document.getElementById("toasts");
      const node = document.createElement("div");
      node.className = "toast";
      node.textContent = message || "Función disponible en el MVP.";
      wrap.appendChild(node);
      setTimeout(() => node.remove(), 2600);
    }

    function simulateAction(message) {
      state.actionCount += 1;
      localStorage.setItem("fcis.actionCount", String(state.actionCount));
      state.lastUpdated = new Date().toLocaleTimeString("es-PE", { hour: "2-digit", minute: "2-digit" });
      const counter = document.querySelector(".action-counter");
      if (counter) counter.textContent = state.actionCount;
      toast(message || "Función disponible en modo demo.");
    }

    function applySearchFilter(query) {
      const q = (query || "").trim().toLowerCase();
      const rows = document.querySelectorAll("tbody tr, .list .list-row");
      rows.forEach(row => {
        const show = !q || row.textContent.toLowerCase().includes(q);
        row.style.display = show ? "" : "none";
      });
    }

    function simulateAi(panel) {
      if (!panel) return;
      const chat = panel.querySelector(".chat");
      const input = panel.querySelector(".ask input");
      const prompt = input && input.value.trim() ? input.value.trim() : "Consulta rápida sobre el caso";
      if (input) input.value = "";
      const typing = document.createElement("div");
      typing.className = "bubble response typing";
      typing.innerHTML = "<i></i><i></i><i></i>";
      chat.appendChild(typing);
      simulateAction("IA-Legal está preparando una respuesta simulada.");
      setTimeout(() => {
        typing.className = "bubble response";
        typing.textContent = `Respuesta simulada: ${prompt}. Para ${DEMO_DATA.case.id}, conviene reforzar la evidencia principal, la norma aplicable y la trazabilidad de actuaciones.`;
      }, 650);
    }

    function exportSummary() {
      const selected = DEMO_DATA.theoryCards[state.selectedTheory] || DEMO_DATA.theoryCards[0];
      const text = `FCIS - Resumen simulado\nCaso: ${DEMO_DATA.case.id}\nDelito: ${DEMO_DATA.case.crime}\nMódulo seleccionado: ${selected[0]}\nDetalle: ${selected[1]}\n${LEGAL}\n`;
      const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "fcis-resumen-teoria.txt";
      a.click();
      URL.revokeObjectURL(url);
      simulateAction("Exportación simulada generada.");
    }

    function copyCaseId() {
      const done = () => simulateAction(`ID copiado: ${DEMO_DATA.case.id}`);
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(DEMO_DATA.case.id).then(done).catch(done);
      } else {
        done();
      }
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    }

    app();
  </script>
</body>
</html>
