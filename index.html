<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Herramientas para el Fiscal / FCIS</title>
  <style>
    :root {
      --navy-950: #061b3a;
      --navy-900: #08245c;
      --navy-800: #0b3475;
      --navy-700: #123f91;
      --blue-soft: #eef4ff;
      --gold-600: #c9921e;
      --gold-500: #d9a331;
      --green-600: #219653;
      --red-600: #d64545;
      --orange-500: #e69500;
      --text-main: #0a1f44;
      --text-muted: #62708a;
      --border-soft: #dfe7f3;
      --bg-main: #f7f9fd;
      --white: #ffffff;
      --shadow-soft: 0 8px 24px rgba(6, 27, 58, 0.08);
      --sidebar: clamp(214px, 13.8vw, 252px);
      --right: clamp(260px, 20vw, 350px);
      --radius: 8px;
    }

    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-main);
      background: var(--bg-main);
    }

    * { box-sizing: border-box; }
    button, input { font: inherit; }
    button { cursor: pointer; }
    button:focus-visible, .clickable:focus-visible, .tab:focus-visible {
      outline: 3px solid rgba(201, 146, 30, 0.45);
      outline-offset: 2px;
    }

    #app {
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-columns: var(--sidebar) 1fr;
      background: var(--bg-main);
    }

    .sidebar {
      height: 100vh;
      overflow: hidden;
      background: var(--white);
      border-right: 1px solid var(--border-soft);
      display: flex;
      flex-direction: column;
      padding: 18px 14px 12px;
      gap: 12px;
    }

    .brand {
      text-align: center;
      padding: 2px 10px 8px;
    }

    .emblem {
      width: 58px;
      height: 58px;
      margin: 0 auto 9px;
      display: grid;
      place-items: center;
      color: var(--gold-500);
      background: linear-gradient(145deg, var(--navy-900), var(--navy-700));
      border: 2px solid var(--gold-500);
      clip-path: polygon(50% 0, 92% 18%, 86% 72%, 50% 100%, 14% 72%, 8% 18%);
      box-shadow: 0 10px 18px rgba(8, 36, 92, 0.18);
    }

    .brand-title {
      color: var(--navy-900);
      font-size: 13px;
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-sub {
      margin-top: 5px;
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.8px;
    }

    .nav {
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .nav-group-label {
      color: #7b879f;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      margin: 8px 10px 4px;
    }

    .nav-item {
      width: 100%;
      min-height: 36px;
      border: 0;
      border-radius: var(--radius);
      padding: 8px 10px;
      background: transparent;
      color: var(--navy-900);
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 13px;
      font-weight: 650;
      text-align: left;
    }

    .nav-item.sub { padding-left: 22px; font-size: 12px; min-height: 31px; }
    .nav-item.active {
      color: var(--white);
      background: linear-gradient(135deg, var(--navy-900), var(--navy-700));
      box-shadow: 0 8px 16px rgba(8, 36, 92, 0.18);
    }
    .nav-item.active .mini-icon { color: var(--gold-500); }

    .mini-icon {
      width: 20px;
      height: 20px;
      color: currentColor;
      flex: 0 0 20px;
    }

    .case-card {
      margin-top: auto;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      padding: 10px;
      background: linear-gradient(180deg, #fff, #f7faff);
      box-shadow: var(--shadow-soft);
      font-size: 11px;
    }

    .case-card strong { display: block; font-size: 13px; color: var(--navy-900); margin: 2px 0; }
    .legal {
      color: var(--text-muted);
      font-size: 9.5px;
      line-height: 1.35;
      border-top: 1px solid var(--border-soft);
      padding-top: 8px;
    }

    .main {
      height: 100vh;
      min-width: 0;
      overflow: hidden;
      display: grid;
      grid-template-rows: 64px 1fr;
    }

    .topbar {
      background: var(--white);
      border-bottom: 1px solid var(--border-soft);
      padding: 10px 22px;
      display: grid;
      grid-template-columns: minmax(230px, 1fr) minmax(260px, 520px) auto;
      gap: 18px;
      align-items: center;
      min-width: 0;
      width: 100%;
    }

    .topbar > div { min-width: 0; }

    .crumb {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .top-title {
      font-size: clamp(18px, 1.35vw, 24px);
      font-weight: 800;
      color: var(--navy-900);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search {
      height: 42px;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      color: var(--text-muted);
      background: #fff;
      font-size: 13px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .icon-btn, .primary-btn, .ghost-btn {
      border-radius: var(--radius);
      border: 1px solid var(--border-soft);
      background: var(--white);
      color: var(--navy-900);
      min-height: 36px;
      padding: 8px 11px;
      font-size: 12px;
      font-weight: 750;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    .icon-btn { width: 36px; padding: 0; }
    .primary-btn {
      background: linear-gradient(135deg, var(--navy-900), var(--navy-700));
      color: var(--white);
      border-color: transparent;
    }
    .gold-btn { background: var(--gold-600); color: #fff; border-color: transparent; }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 700;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--navy-900);
      color: white;
      display: grid;
      place-items: center;
      font-weight: 900;
    }

    .workspace {
      min-height: 0;
      min-width: 0;
      width: 100%;
      overflow: hidden;
      padding: 18px 22px 16px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
    }

    .screen-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
    }

    .screen-title { font-size: clamp(20px, 1.5vw, 26px); font-weight: 850; color: var(--navy-900); }
    .screen-subtitle { color: var(--text-muted); font-size: 13px; margin-top: 2px; }
    .head-actions { display: flex; gap: 8px; align-items: center; }

    .tabs {
      display: flex;
      gap: 6px;
      overflow: hidden;
      min-width: 0;
      margin-top: 8px;
    }

    .tab {
      border: 1px solid var(--border-soft);
      background: var(--white);
      color: var(--text-muted);
      border-radius: var(--radius);
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
    }
    .tab.active { color: var(--navy-900); background: var(--blue-soft); border-color: #c9d9f5; }

    .screen-body {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) var(--right);
      gap: 14px;
      overflow: hidden;
    }

    .panel {
      background: var(--white);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      min-width: 0;
    }

    .panel-pad { padding: 16px; }
    .panel-title { font-size: 18px; font-weight: 850; color: var(--navy-900); }
    .panel-sub { font-size: 12.5px; color: var(--text-muted); margin-top: 4px; }

    .kpi-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }

    .kpi {
      min-height: 82px;
      display: grid;
      grid-template-columns: 48px 1fr;
      align-items: center;
      gap: 10px;
      padding: 12px;
    }

    .icon-orb {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--navy-800);
      background: var(--blue-soft);
    }
    .icon-orb.gold { color: var(--gold-600); background: #fff2d9; }
    .icon-orb.red { color: var(--red-600); background: #fff0f0; }
    .icon-orb.green { color: var(--green-600); background: #eaf8ef; }

    .kpi-label { font-size: 12px; font-weight: 750; }
    .kpi-value { font-size: 28px; line-height: 1; color: var(--navy-900); font-weight: 850; margin-top: 2px; }
    .kpi-note { font-size: 12px; color: var(--text-muted); margin-top: 5px; }
    .kpi-note.green { color: var(--green-600); }
    .kpi-note.orange { color: var(--orange-500); }

    .dashboard-grid {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-height: 0;
      gap: 10px;
    }

    .module-grid {
      position: relative;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px 14px;
      margin-top: 14px;
    }

    .module-card, .item-card, .mini-card {
      border: 1px solid var(--border-soft);
      background: #fff;
      border-radius: var(--radius);
      box-shadow: 0 6px 18px rgba(6, 27, 58, 0.06);
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
    }
    .module-card:hover, .item-card:hover, .mini-card:hover,
    .module-card.selected, .item-card.selected, .mini-card.selected {
      transform: translateY(-1px);
      border-color: #9fb8e8;
      box-shadow: 0 10px 22px rgba(6, 27, 58, 0.11);
    }

    .module-card {
      min-height: clamp(112px, 15vh, 142px);
      padding: 14px;
      display: grid;
      grid-template-columns: 44px 1fr 18px;
      gap: 10px;
      align-items: start;
      position: relative;
    }
    .module-card:after {
      content: "";
      position: absolute;
      right: -15px;
      top: 50%;
      width: 16px;
      border-top: 2px dotted var(--navy-700);
      opacity: .55;
    }
    .module-card:nth-child(4):after, .module-card:nth-child(8):after { display: none; }
    .module-title { font-size: 13px; font-weight: 850; color: var(--navy-900); margin-bottom: 7px; }
    .module-text { font-size: 11.5px; color: var(--text-main); line-height: 1.42; min-height: 34px; }
    .arrow { color: var(--navy-800); align-self: end; font-weight: 900; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 6px;
      padding: 5px 9px;
      font-size: 11.5px;
      font-weight: 750;
      margin-top: 10px;
      background: var(--blue-soft);
      color: var(--navy-800);
    }
    .badge:before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }
    .badge.complete { background: #eaf8ef; color: var(--green-600); }
    .badge.priority { background: #fff3df; color: var(--orange-500); }
    .badge.danger { background: #fff0f0; color: var(--red-600); }
    .badge.muted { background: #f1f4f8; color: #7b879f; }

    .activity {
      margin-top: 12px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 270px;
      gap: 14px;
      min-height: 0;
    }

    .activity-list { display: grid; gap: 0; margin-top: 10px; }
    .activity-row {
      min-height: 38px;
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr) 115px;
      gap: 12px;
      align-items: center;
      border-top: 1px solid var(--border-soft);
      font-size: 12px;
    }
    .activity-row strong { color: var(--navy-800); }
    .activity-row span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .quick { min-height: 82px; flex-direction: column; width: 100%; }
    .quick.primary-btn { min-height: 82px; }

    .guide-step {
      display: grid;
      grid-template-columns: 32px 1fr auto;
      gap: 10px;
      align-items: center;
      min-height: 44px;
      font-size: 12.5px;
      position: relative;
    }
    .step-num {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 1.5px solid #aeb9c9;
      color: var(--text-muted);
      font-weight: 850;
      background: #fff;
      z-index: 1;
    }
    .guide-step.done .step-num { border-color: var(--green-600); color: var(--green-600); background: #f4fff8; }
    .guide-step.active { background: var(--blue-soft); margin: 0 -10px; padding: 0 10px; border-radius: var(--radius); }
    .guide-step.active .step-num { background: var(--navy-900); border-color: var(--navy-900); color: white; }
    .guide-step:not(:last-child):before {
      content: "";
      position: absolute;
      left: 13px;
      top: 28px;
      height: 18px;
      border-left: 2px dotted #b6c3d5;
    }

    .canvas-layout {
      min-height: 0;
      height: 100%;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
    }

    .canvas-scroll {
      min-height: 0;
      overflow: hidden;
      position: relative;
    }

    .timeline {
      height: 100%;
      display: grid;
      grid-template-columns: 140px repeat(5, minmax(155px, 1fr));
      gap: 10px;
      align-items: center;
    }

    .legend {
      align-self: stretch;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      border-right: 1px dashed var(--border-soft);
      padding-right: 10px;
    }
    .legend .badge { margin: 0; justify-content: flex-start; }

    .item-card { padding: 12px; min-height: 118px; font-size: 12px; }
    .item-code { color: var(--gold-600); font-weight: 900; font-size: 12px; }
    .item-title { font-weight: 850; color: var(--navy-900); margin: 4px 0; }
    .item-desc { color: var(--text-main); line-height: 1.35; }

    .element-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .mapping {
      height: 100%;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .column-title {
      color: var(--navy-900);
      font-weight: 850;
      font-size: 13px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .stack { display: grid; gap: 8px; align-content: start; min-height: 0; }
    .compact-card {
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      background: #fff;
      padding: 10px;
      font-size: 11.5px;
      line-height: 1.35;
      box-shadow: 0 5px 14px rgba(6, 27, 58, 0.05);
    }
    .compact-card strong { display: block; color: var(--navy-900); margin-bottom: 3px; }

    .relation-board {
      height: 100%;
      display: grid;
      grid-template-columns: 150px repeat(4, minmax(120px, 1fr));
      gap: 10px;
      position: relative;
    }
    .relation-board.medios { grid-template-columns: 210px minmax(300px, 1fr) 170px; }
    .relation-board:before {
      content: "";
      position: absolute;
      left: 13%;
      right: 13%;
      top: 50%;
      border-top: 2px dotted rgba(18, 63, 145, .28);
      pointer-events: none;
    }
    .drop-card {
      border: 1px dashed #b9c7dc;
      background: #f9fbff;
      color: var(--text-muted);
      text-align: center;
      padding: 12px;
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 750;
    }

    .hypothesis {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
    }
    .hyp-main {
      padding: 13px;
      border-radius: var(--radius);
      border: 1px solid #c9d9f5;
      background: linear-gradient(180deg, #fff, #f4f8ff);
      font-size: 13px;
    }
    .hyp-cols {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .weak-board, .next-board {
      height: 100%;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }
    .next-board { grid-template-columns: 1.1fr 1fr 1.15fr 1.2fr; }

    .detail {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }
    .detail h3 { margin: 0; font-size: 18px; color: var(--navy-900); }
    .detail-section {
      border-top: 1px solid var(--border-soft);
      padding-top: 9px;
      font-size: 12px;
      line-height: 1.4;
    }
    .detail-label { color: var(--text-muted); font-size: 11px; font-weight: 800; text-transform: uppercase; }
    .detail-value { margin-top: 2px; color: var(--text-main); }
    .detail-list { padding-left: 16px; margin: 6px 0 0; }
    .detail-list li { margin: 3px 0; }

    .footer-strip {
      min-height: 28px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 12px;
      color: var(--text-muted);
      font-size: 10.5px;
      overflow: hidden;
    }
    .tour {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .progress {
      width: 112px;
      height: 6px;
      background: #dbe4f2;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress span { display: block; height: 100%; background: var(--gold-600); width: 0; transition: width .2s ease; }

    .notice-mobile {
      display: none;
      color: var(--orange-500);
      font-weight: 750;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .toast-wrap {
      position: fixed;
      right: 18px;
      bottom: 18px;
      display: grid;
      gap: 8px;
      z-index: 50;
    }
    .toast {
      background: var(--navy-950);
      color: #fff;
      padding: 11px 13px;
      border-radius: var(--radius);
      box-shadow: 0 12px 28px rgba(6,27,58,.22);
      font-size: 12px;
      max-width: 340px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1100px) {
      :root { --sidebar: 72px; --right: 250px; }
      .brand-title, .brand-sub, .nav-item span, .nav-group-label, .case-card, .legal { display: none; }
      .sidebar { padding: 14px 10px; align-items: center; }
      .nav-item, .nav-item.sub { justify-content: center; padding: 8px; }
      .emblem { width: 46px; height: 46px; }
      .topbar { grid-template-columns: 1fr 330px auto; padding: 10px 14px; }
      .module-grid, .element-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .activity { grid-template-columns: 1fr; }
      .quick-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .activity .panel:last-child { display: none; }
    }

    @media (max-width: 760px) {
      :root { --sidebar: 54px; --right: 0px; }
      .topbar { grid-template-columns: minmax(0, 1fr) auto; gap: 6px; padding-left: 10px; padding-right: 8px; }
      .top-actions { gap: 5px; }
      .top-actions .icon-btn:nth-child(2), .user-chip { display: none; }
      .search { display: none; }
      .top-title { font-size: 18px; }
      .workspace { padding: 10px; gap: 7px; }
      .screen-head { grid-template-columns: 1fr; }
      .head-actions { overflow: hidden; }
      .screen-body { grid-template-columns: 1fr; }
      .screen-body > .panel.detail-panel { display: none; }
      .kpi-row { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 7px; }
      .kpi { min-height: 64px; grid-template-columns: 36px 1fr; padding: 8px; }
      .icon-orb { width: 36px; height: 36px; }
      .kpi-value { font-size: 20px; }
      .module-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 7px; }
      .module-card { min-height: 96px; padding: 9px; grid-template-columns: 34px 1fr; }
      .module-card .arrow { display: none; }
      .module-text { display: none; }
      .activity { display: none; }
      .timeline, .relation-board, .relation-board.medios, .mapping, .weak-board, .next-board, .hyp-cols, .element-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .legend { display: none; }
      .tabs { overflow-x: auto; }
      .notice-mobile { display: block; }
      .footer-strip { grid-template-columns: 1fr; }
      .footer-strip .tour { display: none; }
    }

    @media (max-height: 790px) {
      .workspace { padding-top: 12px; padding-bottom: 10px; gap: 8px; }

    function genericWorkspace({ actions = [], tabs = [], kpis = null, body = "", detail = "" }) {
      return `<section class="workspace">
        ${renderHeader(actions, tabs)}
        <div style="min-height:0;overflow:hidden;display:grid;grid-template-rows:${kpis ? "auto " : ""}1fr;gap:10px">
          ${kpis ? `<div class="kpi-row">${kpis.map(renderKpiCard).join("")}</div>` : ""}
          <div class="screen-body">${body}<aside class="panel detail-panel">${detail}</aside></div>
        </div>
        ${renderFooter()}
      </section>`;
    }

    function renderDetailPanel(title, rows, buttons = []) {
      return `<div class="detail">
        <h3>${title}</h3>
        ${rows.map(r => `<div class="detail-section"><div class="detail-label">${r[0]}</div><div class="detail-value">${r[1]}</div></div>`).join("")}
        ${buttons.length ? `<div class="detail-section" style="margin-top:auto;display:flex;gap:8px;flex-wrap:wrap">${buttons.map(b => `<button class="ghost-btn" data-action="${b.includes("Exportar") ? "export" : b.includes("Guardar") ? "save" : "toast"}">${b}</button>`).join("")}</div>` : ""}
      </div>`;
    }

    function renderPlaceholder() {
      return genericWorkspace({
        body: `<div class="panel panel-pad"><div class="panel-title">Módulo en preparación</div><div class="panel-sub">${NOTE}</div></div>`,
        detail: renderDetailPanel("Detalle", [["Estado", "Función disponible en el MVP."]])
      });
    }

    function renderFooter() {
      const idx = screenIndex() + 1;
      return `<footer class="footer-strip">
        <div><span class="notice-mobile">Para una mejor experiencia, se recomienda visualizar esta demo en modo web escritorio.</span><span>${NOTE}</span></div>
        <div class="tour"><span>Pantalla ${idx} de ${DEMO_DATA.screens.length}</span><div class="progress"><span style="width:${state.progress}%"></span></div></div>
        <div>${LEGAL}</div>
      </footer>`;
    }

    function bindInteractions() {
      document.querySelectorAll("[data-screen]").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.dataset.screen;
          if (!DEMO_DATA.screens.some(s => s.id === id)) return renderToast("Función disponible en el MVP.");
          state.currentScreen = id;
          state.progress = 0;
          renderApp();
        });
      });
      document.querySelectorAll("[data-select]").forEach(btn => {
        btn.addEventListener("click", () => {
          const [key, val] = btn.dataset.select.split(":");
          state.selected[key] = val;
          renderApp();
        });
      });
      document.querySelectorAll("[data-tab]").forEach(btn => {
        btn.addEventListener("click", () => {
          state.activeTab[state.currentScreen] = btn.dataset.tab;
          renderToast("Función disponible en el MVP.");
          renderApp();
        });
      });
      document.querySelectorAll("[data-toast]").forEach(btn => btn.addEventListener("click", () => renderToast(btn.dataset.toast)));
      document.querySelectorAll("[data-action]").forEach(btn => {
        btn.addEventListener("click", () => {
          const a = btn.dataset.action;
          if (a === "export") return simulateExport();
          if (a === "save") return renderToast("Análisis guardado en modo demo.");
          renderToast("Función disponible en el MVP.");
        });
      });
      document.querySelectorAll("[data-tour]").forEach(btn => btn.addEventListener("click", toggleTour));
    }

    function renderToast(message) {
      const wrap = document.getElementById("toasts");
      const el = document.createElement("div");
      el.className = "toast";
      el.textContent = message;
      wrap.appendChild(el);
      setTimeout(() => el.remove(), 2800);
    }

    function simulateExport() {
      const s = DEMO_DATA.screens[screenIndex()];
      const blob = new Blob([`FCIS Demo\n${s.title}\nCaso: ${DEMO_DATA.case.id}\n${NOTE}\n${LEGAL}\n`], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `fcis-${s.id}.txt`;
      a.click();
      URL.revokeObjectURL(url);
      renderToast("Exportación simulada para demo.");
    }

    function toggleTour() {
      state.tour = true;
      state.paused = !state.paused && state.timer ? true : false;
      if (!state.timer || !state.paused) startTour();
      else stopTour(false);
      renderApp();
    }

    function startTour() {
      stopTour(false);
      state.tour = true;
      state.paused = false;
      state.progress = 0;
      state.timer = setInterval(nextScreen, 8000);
      state.progressTimer = setInterval(() => {
        state.progress = Math.min(100, state.progress + 1.25);
        updateTourProgress();
      }, 100);
    }

    function stopTour(clear = true) {
      clearInterval(state.timer);
      clearInterval(state.progressTimer);
      state.timer = null;
      state.progressTimer = null;
      if (clear) state.tour = false;
    }

    function nextScreen() {
      const next = (screenIndex() + 1) % DEMO_DATA.screens.length;
      state.currentScreen = DEMO_DATA.screens[next].id;
      state.progress = 0;
      renderApp();
    }

    function prevScreen() {
      const prev = (screenIndex() - 1 + DEMO_DATA.screens.length) % DEMO_DATA.screens.length;
      state.currentScreen = DEMO_DATA.screens[prev].id;
      state.progress = 0;
      renderApp();
    }

    function updateTourProgress() {
      const p = document.querySelector(".progress span");
      if (p) p.style.width = `${state.progress}%`;
    }

    document.addEventListener("keydown", (event) => {
      if (event.target && ["INPUT", "TEXTAREA"].includes(event.target.tagName)) return;
      if (event.key === "ArrowRight") nextScreen();
      if (event.key === "ArrowLeft") prevScreen();
      if (event.key === " ") {
        event.preventDefault();
        if (state.timer) { state.paused = true; stopTour(false); }
        else startTour();
        renderApp();
      }
    });

    renderApp();
  </script>
</body>
</html>
